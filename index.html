<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本沖繩行 2026 (富士藍度假版)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght=700&family=Noto+Sans+TC:wght=300;400;500;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        cute: ['Comic Neue', 'Noto Sans TC', 'sans-serif']

                        fuji: {
                            bg: '#F3F7FA',

<body class="font-sans min-h-screen pb-24 flex justify-center">

    <div class="w-full max-w-md bg-fuji-bg min-h-screen shadow-xl relative flex flex-col">
        
        <header class="bg-fuji-primary p-6 pt-8 pb-8 text-center relative rounded-b-[2rem] shadow-md overflow-hidden">
            <div class="absolute -right-6 -top-6 text-fuji-secondary/20 text-7xl"><i class="fa-solid fa-cloud"></i></div>

            <h1 class="font-cute text-3xl font-bold text-white tracking-wide flex items-center justify-center gap-2">
                <i class="fa-solid fa-umbrella-beach text-fuji-accent"></i> 日本沖繩行
            </h1>
            <p class="text-xs text-fuji-light/90 mt-2 bg-white/10 inline-block px-3 py-1 rounded-full backdrop-blur-sm tracking-wide">
                <i class="fa-regular fa-calendar-days mr-1 text-fuji-accent"></i> 2026 / 10 / 01 － 10 / 04

        <main class="flex-1 p-4 overflow-y-auto">
            
            <section id="page-plan" class="tab-content block">
                <div class="flex justify-between items-center mb-4 pb-2">
                    <h2 class="font-cute text-lg font-bold text-fuji-primary flex items-center gap-1">
                        <i class="fa-solid fa-route text-fuji-accent"></i> 行程時光軸
                    </h2>
                    <div class="flex gap-1.5 text-xs font-bold">
                        <button onclick="switchDay('d1')" id="btn-d1" class="day-btn px-3 py-1.5 bg-fuji-primary text-white rounded-full shadow-sm transition-all">D1</button>
                        <button onclick="switchDay('d2')" id="btn-d2" class="day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm transition-all">D2</button>
                        <button onclick="switchDay('d3')" id="btn-d3" class="day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm transition-all">D3</button>
                        <button onclick="switchDay('d4')" id="btn-d4" class="day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm transition-all">D4</button>
                    </div>
                </div>
                <div id="loading-status" class="text-center py-12 text-sm text-fuji-secondary font-medium">

                <div id="day-d3" class="day-timeline space-y-4 hidden"></div>

            </section>

            <section id="page-guide" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-4 flex items-center gap-1"><i class="fa-solid fa-map-marked-alt text-fuji-accent"></i> 手帳地圖導覽</h2>
                <div class="space-y-6">
                    <article class="bg-fuji-paper p-5 rounded-2xl shadow-sm border border-fuji-light">
                        <span class="text-xs bg-fuji-primary text-white px-2.5 py-1 rounded-full font-bold">🐋 深度文化</span>
                        <h3 class="text-lg font-bold text-fuji-dark mt-2 mb-2">美麗海水族館：黑潮之海</h3>
                        <p class="text-sm text-fuji-dark/90 leading-relaxed mb-4 text-justify">這裡擁有世界第三大的巨大水槽「黑潮之海」。為了承受如此巨大的水壓，水槽的壓克力觀景窗厚度高達 60 公分！</p>
                        <div class="w-full h-48 rounded-2xl overflow-hidden border border-fuji-light shadow-inner">
                            <iframe width="100%" height="100%" frameborder="0" src="https://www.openstreetmap.org/export/embed.html?bbox=127.8752%2C26.6923%2C127.8812%2C26.6963&layer=mapnik&marker=26.6943%2C127.8782"></iframe>

            <section id="page-shopping" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1">
                    <i class="fa-solid fa-cart-shopping text-fuji-accent"></i> 藥妝伴手禮清單

                <div class="bg-fuji-paper p-4 rounded-2xl border border-fuji-light shadow-sm mb-5 space-y-2">
                    <div class="text-[11px] font-bold text-fuji-secondary mb-1"><i class="fa-solid fa-pencil mr-1 text-fuji-primary"></i>新增個人私房備忘</div>
                    <div class="grid grid-cols-3 gap-2">
                        <input type="text" id="shop-item-name" placeholder="商品名稱" class="col-span-2 px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                        <input type="number" id="shop-item-qty" placeholder="數量" min="1" value="1" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none text-center font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="shop-item-store" placeholder="店家" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                        <input type="text" id="shop-item-note" placeholder="備註內容" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                    </div>
                    <button onclick="addLocalShoppingItem()" class="w-full bg-fuji-primary text-white text-xs font-bold py-2.5 rounded-xl shadow-md hover:bg-fuji-dark transition-all"><i class="fa-solid fa-plus mr-1"></i>加入個人購買清單</button>
                </div>

                <div id="shopping-list-container" class="space-y-6">
                    <div class="text-center py-4 text-xs text-fuji-secondary"><i class="fa-solid fa-spinner fa-spin mr-1"></i>正在為您整理店舖清單...</div>
                </div>
            </section>

            <section id="page-wallet" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-4 flex items-center gap-1"><i class="fa-solid fa-coins text-fuji-accent"></i> 隨身小帳本</h2>
                <div class="bg-fuji-paper p-4 rounded-2xl border border-fuji-light shadow-sm mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs font-bold text-fuji-primary">自訂日幣匯率 (1 JPY = TWD)</label>
                        <input type="number" id="exchange-rate" value="0.215" step="0.001" class="w-20 px-2 py-1 text-right text-xs border border-fuji-light rounded-lg bg-fuji-bg font-bold text-fuji-primary">
                    </div>
                    <input type="text" id="calc-input" placeholder="小計算機，如: 500+1200" class="w-full px-3 py-2 border border-fuji-light rounded-xl bg-fuji-bg text-sm font-mono focus:outline-none">
                    <div class="flex justify-between text-xs px-1 mt-2 font-medium">
                        <span class="text-fuji-secondary">計算: <strong id="calc-jpy" class="text-fuji-dark">0</strong> JPY</span>
                        <span class="text-fuji-secondary">台幣: <strong id="calc-twd" class="text-fuji-accent text-sm">NT$ 0</strong></span>
                    </div>
                </div>
                <div class="bg-fuji-paper p-4 rounded-2xl border border-fuji-light shadow-sm mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <input type="text" id="expense-title" placeholder="買了什麼？" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                        <input type="number" id="expense-amount" placeholder="日幣金額" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                    </div>
                    <button onclick="addExpense()" class="w-full bg-fuji-primary text-white text-xs font-bold py-2.5 rounded-xl shadow-md hover:bg-fuji-dark transition-all"><i class="fa-solid fa-plus mr-1"></i>記一筆度假開銷</button>
                </div>
                <div id="expense-list" class="space-y-2"></div>
            </section>

            <section id="page-lists" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1"><i class="fa-solid fa-clipboard-check text-fuji-accent"></i> 行前行李檢查點</h2>
                <div id="checklist-container" class="bg-fuji-paper p-5 rounded-2xl border border-fuji-light shadow-sm space-y-3"></div>
            </section>

            <section id="page-info" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-4 flex items-center gap-1"><i class="fa-solid fa-info-circle text-fuji-accent"></i> 實用旅遊資訊</h2>
                <div class="bg-fuji-paper p-6 rounded-2xl border border-fuji-light shadow-sm text-center">
                    <div class="text-4xl text-fuji-primary/30 mb-2"><i class="fa-solid fa-file-signature"></i></div>
                    <p class="text-xs text-fuji-secondary font-medium mb-3">點擊下方直接開啟 Google 試算表App<br>大家可以一齊即時修改行程喔！</p>
                    <a id="edit-sheet-btn" href="#" target="_blank" class="inline-block w-full bg-fuji-accent text-white text-xs font-bold py-3 rounded-xl shadow-md hover:bg-opacity-90 transition-all"><i class="fa-solid fa-pen-to-square mr-1"></i>呼叫 Google 試算表線上編輯</a>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-fuji-paper/95 backdrop-blur-md border-t border-fuji-light flex justify-around items-center py-2 z-50 shadow-lg rounded-t-2xl px-1">
            <button onclick="switchTab('plan')" id="nav-plan" class="nav-btn flex flex-col items-center text-fuji-primary transition-all"><i class="fa-solid fa-compass text-base"></i><span class="text-[10px] font-bold mt-0.5">行程</span></button>
            <button onclick="switchTab('guide')" id="nav-guide" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-map-location-dot text-base"></i><span class="text-[10px] font-bold mt-0.5">地圖</span></button>
            <button onclick="switchTab('shopping')" id="nav-shopping" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-cart-shopping text-base"></i><span class="text-[10px] font-bold mt-0.5">購物</span></button>
            <button onclick="switchTab('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-wallet text-base"></i><span class="text-[10px] font-bold mt-0.5">錢包</span></button>
            <button onclick="switchTab('lists')" id="nav-lists" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-check-square text-base"></i><span class="text-[10px] font-bold mt-0.5">行前準備</span></button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-circle-info text-base"></i><span class="text-[10px] font-bold mt-0.5">資訊</span></button>
        </nav>
    </div>

    <script>
        const SHEET_ID = '1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        const SHOPPING_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E8%B3%BC%E7%89%A9`;
        const SHEET_EDIT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=0#gid=0`;

        let cloudShoppingItems = [];

        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.getElementById('edit-sheet-btn');
            if (editBtn) editBtn.href = SHEET_EDIT_URL;
            fetchTravelPlan();
            fetchCloudShopping();
            initChecklist();
            loadExpenses();
            initCalc();
        });

        // 行程抓取機制
        async function fetchTravelPlan() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                parseAndRenderCSV(csvText);
                document.getElementById('loading-status').classList.add('hidden');
            } catch (error) {
                console.error(error);
            }
        }

        function parseAndRenderCSV(csvText) {
            const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if(lines.length <= 1) return;
            const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
            document.getElementById('day-d1').innerHTML = '';
            document.getElementById('day-d2').innerHTML = '';
            document.getElementById('day-d3').innerHTML = '';
            document.getElementById('day-d4').innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                if(currentLine.length < headers.length) continue;
                let row = {};
                headers.forEach((header, index) => { row[header] = currentLine[index]; });
                if(!row['標題'] && !row['時間起']) continue;
                renderTimelineCard(row);
            }
        }

        function renderTimelineCard(row) {
            let dayValue = (row['Day'] || '').trim().toLowerCase(); 
            if (dayValue.startsWith('d')) { dayValue = 'd' + dayValue.replace(/[^0-9]/g, ''); }
            const containerId = `day-${dayValue}`;
            const targetContainer = document.getElementById(containerId);
            if (!targetContainer) return;

            let timeString = row['時間起'] || '';
            if (row['時間迄']) { timeString += ` - ${row['時間迄']}`; }

            let buttonHtml = '';
            if (row['Google Map']) buttonHtml += `<a href="${row['Google Map']}" target="_blank" class="text-[11px] bg-fuji-bg font-bold px-2.5 py-1 rounded-full text-fuji-primary border border-fuji-light mr-1.5 inline-flex items-center gap-0.5"><i class="fa-solid fa-location-dot text-fuji-accent"></i>導航</a>`;
            if (row['網頁']) buttonHtml += `<a href="${row['網頁']}" target="_blank" class="text-[11px] bg-fuji-bg font-bold px-2.5 py-1 rounded-full text-fuji-primary border border-fuji-light mr-1.5 inline-flex items-center gap-0.5"><i class="fa-solid fa-earth-asia"></i>網站</a>`;

            let metaHtml = '';
            if (row['區間費用']) metaHtml += `<span class="inline-block bg-fuji-light text-fuji-primary text-[10px] font-bold px-2 py-0.5 rounded-md mr-1.5">💰 ${row['區間費用']}</span>`;
            if (row['備註']) metaHtml += `<span class="text-[11px] text-fuji-accent font-bold">💬 ${row['備註']}</span>`;

            let cardHtml = `<div class="bg-fuji-paper p-4 rounded-2xl shadow-sm border border-fuji-light hover:border-fuji-secondary transition-all"><div class="flex justify-between items-center text-xs text-fuji-secondary font-bold mb-1"><span class="text-fuji-primary bg-fuji-light px-2 py-0.5 rounded-full">${timeString}</span>${row['分類'] ? `<span class="text-[10px] bg-fuji-bg px-2 py-0.5 rounded-full text-fuji-primary border border-fuji-light">${row['分類']}</span>` : ''}</div><h4 class="font-bold text-fuji-dark text-base mt-1.5">${row['標題'] || '未命名行程'}</h4>${row['說明'] ? `<p class="text-xs text-fuji-secondary mt-1.5 text-justify leading-relaxed">${row['說明']}</p>` : ''}<div class="mt-2.5">${metaHtml}</div><div class="mt-2.5">${buttonHtml}</div></div>`;
            
            if (row['分類'] === '重要') {
                cardHtml = `<div class="bg-fuji-accent/10 border-l-4 border-fuji-accent p-4 rounded-2xl shadow-sm bg-white"><div class="flex justify-between text-xs text-fuji-accent font-bold mb-1"><span class="bg-fuji-accent text-white px-2 py-0.5 rounded-full">${timeString}</span><span><i class="fa-solid fa-star fa-spin mr-1"></i>重要提醒</span></div><p class="font-bold text-fuji-dark text-base mt-1.5">${row['標題'] || '未命名行程'}</p>${row['說明'] ? `<p class="text-xs text-fuji-dark/80 mt-1.5 leading-relaxed bg-fuji-bg/50 p-2 rounded-xl text-justify">${row['說明']}</p>` : ''}<div class="mt-2.5">${metaHtml}</div><div class="mt-2.5">${buttonHtml}</div></div>`;
            }
            targetContainer.innerHTML += cardHtml;
        }

        // 🌟【店家 LOGO 智慧識別器與連結適配】
        function getStoreMeta(storeName) {
            const name = (storeName || '').trim();
            let icon = '<i class="fa-solid fa-shop text-fuji-primary"></i>';
            let defaultLink = '';

            if (name.includes('大國')) {
                icon = '<span class="bg-orange-500 text-white font-extrabold text-[10px] px-1 py-0.5 rounded shadow-sm">大國</span>';
                defaultLink = 'https://www.daikokudrug.com/';
            } else if (name.includes('唐吉') || name.includes('驚安') || name.includes('Donki')) {
                icon = '<span class="bg-yellow-400 text-black font-extrabold text-[10px] px-1 py-0.5 rounded shadow-sm">🐧 DONKI</span>';
                defaultLink = 'https://www.donki.com/taiwan/';
            } else if (name.includes('AEON') || name.includes('永旺')) {
                icon = '<span class="bg-magenta-700 bg-purple-600 text-white font-extrabold text-[10px] px-1 py-0.5 rounded shadow-sm">AEON</span>';
                defaultLink = 'https://www.aeon-okinawa.com/zh-tw/';
            } else if (name.includes('Orion')) {
                icon = '<span class="bg-blue-600 text-white font-extrabold text-[9px] px-1 py-0.5 rounded shadow-sm">Orion</span>';
            }
            return { icon, defaultLink };
        }

        // 🌟【雲端購物清單讀取】
        async function fetchCloudShopping() {
            try {
                const response = await fetch(SHOPPING_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                cloudShoppingItems = [];
                
                if (lines.length > 1) {
                    const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
                    for(let i=1; i<lines.length; i++) {
                        const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                        if (currentLine.length < headers.length) continue;
                        let row = {};
                        headers.forEach((header, index) => { row[header] = currentLine[index]; });
                        
                        if (row['商品名稱']) {
                            cloudShoppingItems.push({
                                id: 'cloud-' + i,
                                name: row['商品名稱'],
                                qty: parseInt(row['數量']) || 1,
                                store: row['店家'] || '未分類店家',
                                note: row['備註'] || '',
                                link: row['連結'] || '',
                                image: row['商品圖片'] || '',
                                isCloud: true
                            });
                        }
                    }
                }
            } catch (error) {
                console.error("尚未讀取到雲端購物分頁，改以本機個人模式運作。");
            }
            renderCombinedShoppingList();
        }

        // 🌟【核心：同一店家群組化渲染機制】
        function renderCombinedShoppingList() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;
            container.innerHTML = '';

            const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            const checkedIds = JSON.parse(localStorage.getItem('ok_shopping_checked_ids')) || [];
            
            // 讀取各項目的即時手動修改數量
            const modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};

            // 合併雲端與個人項目
            const allItems = [...cloudShoppingItems, ...localItems];

            if (allItems.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-xs text-fuji-secondary font-medium">🛒 清單空空如也。<br>可在下方直接記錄，或在試算表同步輸入！</div>`;
                return;
            }

            // 按店家進行分類群組 (Group by Store)
            const storeGroups = {};
            allItems.forEach(item => {
                const storeName = item.store || '其他待辦購買';
                if (!storeGroups[storeName]) {
                    storeGroups[storeName] = { items: [], customLink: '' };
                }
                // 如果有在試算表設定連結，就拿來用
                if (item.link && !storeGroups[storeName].customLink) {
                    storeGroups[storeName].customLink = item.link;
                }
                
                // 套用使用者在手機介面微調後的數量
                if (modifiedQtys[item.id] !== undefined) {
                    item.qty = modifiedQtys[item.id];
                }
                storeGroups[storeName].items.push(item);
            });

            // 渲染群組大框框
            for (const [storeName, group] of Object.entries(storeGroups)) {
                const meta = getStoreMeta(storeName);
                const finalLink = group.customLink || meta.defaultLink;
                
                let groupHtml = `
                    <div class="bg-fuji-paper rounded-2xl border border-fuji-light shadow-sm overflow-hidden bg-white">
                        <div class="bg-fuji-bg/70 px-4 py-3 border-b border-fuji-light flex justify-between items-center">
                            <div class="flex items-center gap-2 font-bold text-sm text-fuji-dark">
                                ${meta.icon}
                                <span>${storeName}</span>
                            </div>
                            ${finalLink ? `
                                <a href="${finalLink}" target="_blank" class="text-[11px] font-bold text-fuji-primary hover:text-fuji-accent flex items-center gap-0.5 bg-white px-2 py-0.5 rounded-full border border-fuji-light shadow-2xs">
                                    <i class="fa-solid fa-arrow-up-right-from-square text-[9px]"></i> 連結
                                </a>` : ''
                            }
                        </div>
                        <div class="divide-y divide-fuji-light">`;

                group.items.forEach(item => {
                    const isChecked = checkedIds.includes(item.id);
                    // 沒填商品圖片就給一個精緻的粉藍色預設購物包圖示
                    const imgUrl = item.image || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%238FAEC3"><path d="M19 7h-3V6a4 4 0 0 0-8 0v1H5a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm-9-1a2 2 0 0 1 4 0v1h-4zm9 14H5V9h3v2h2V9h4v2h2V9h3z"/></svg>';

                    groupHtml += `
                        <div class="p-3.5 flex items-center gap-3 transition-all relative ${isChecked ? 'bg-fuji-bg/30' : ''}">
                            <div class="w-11 h-11 rounded-xl bg-fuji-bg border border-fuji-light flex-shrink-0 overflow-hidden flex items-center justify-center shadow-2xs">
                                <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%238FAEC3\'><path d=\'M19 7h-3V6a4 4 0 0 0-8 0v1H5a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zm-9-1a2 2 0 0 1 4 0v1h-4zm9 14H5V9h3v2h2V9h4v2h2V9h3z\'/></svg>'">
                            </div>

                            <div class="flex-1 min-w-0 cursor-pointer" onclick="toggleShoppingCheck('${item.id}')">
                                <div class="flex items-center gap-1.5">
                                    <span class="font-bold text-sm select-none break-words ${isChecked ? 'line-through text-fuji-secondary font-normal' : 'text-fuji-dark'}">
                                        ${item.name}
                                    </span>
                                    ${!item.isCloud ? `<span class="text-[9px] bg-amber-50 text-amber-600 font-bold px-1 rounded border border-amber-200 flex-shrink-0">私人</span>` : ''}
                                </div>
                                ${item.note ? `<div class="text-[11px] text-fuji-secondary mt-0.5 font-medium truncate"><i class="fa-regular fa-comment-dots mr-0.5"></i>${item.note}</div>` : ''}
                            </div>

                            <div class="flex items-center gap-1.5 ml-2 flex-shrink-0">
                                <div class="flex items-center border border-fuji-light rounded-lg bg-fuji-bg overflow-hidden shadow-2xs">
                                    <button onclick="adjustQty('${item.id}', -1)" class="px-2 py-1 text-fuji-primary hover:bg-fuji-light transition-all text-xs font-bold"><i class="fa-solid fa-minus"></i></button>
                                    <span class="px-2 text-xs font-extrabold text-fuji-dark min-w-[20px] text-center select-none">${item.qty}</span>
                                    <button onclick="adjustQty('${item.id}', 1)" class="px-2 py-1 text-fuji-primary hover:bg-fuji-light transition-all text-xs font-bold"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                ${!item.isCloud ? `
                                    <button onclick="deleteLocalShoppingItem('${item.id}')" class="text-fuji-secondary hover:text-fuji-accent p-1.5 transition-all text-xs">
                                        <i class="fa-regular fa-trash-can"></i>
                                    </button>` : '<div class="w-7"></div>'
                                }
                            </div>
                        </div>`;
                });

                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            }
        }

        // 🌟【數量局部增減控制】
        function adjustQty(id, change) {
            const modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};
            
            // 尋找目前的初始數量
            let currentQty = 1;
            const item = [...cloudShoppingItems, ...(JSON.parse(localStorage.getItem('ok_shopping_local')) || [])].find(i => i.id === id);
            if (item) {
                currentQty = modifiedQtys[id] !== undefined ? modifiedQtys[id] : item.qty;
            }

            let newQty = currentQty + change;
            if (newQty < 1) newQty = 1; // 最少為1

            modifiedQtys[id] = newQty;
            localStorage.setItem('ok_shopping_qtys', JSON.stringify(modifiedQtys));
            renderCombinedShoppingList();
        }

        // 新增個人小項目
        function addLocalShoppingItem() {
            const name = document.getElementById('shop-item-name').value.trim();
            const qty = parseInt(document.getElementById('shop-item-qty').value) || 1;
            const store = document.getElementById('shop-item-store').value.trim() || '個人私房購買';
            const note = document.getElementById('shop-item-note').value.trim();

            if (!name) { alert('請填寫商品名稱唷！'); return; }

            const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            localItems.push({
                id: 'local-' + Date.now(),
                name, qty, store, note,
                image: '', // 個人隨手記採預設精緻圖示
                isCloud: false
            });
            localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));

            document.getElementById('shop-item-name').value = '';
            document.getElementById('shop-item-qty').value = '1';
            document.getElementById('shop-item-store').value = '';
            document.getElementById('shop-item-note').value = '';

            renderCombinedShoppingList();
        }

        // 點擊文字切換勾選狀態
        function toggleShoppingCheck(id) {
            let checkedIds = JSON.parse(localStorage.getItem('ok_shopping_checked_ids')) || [];
            if (checkedIds.includes(id)) {
                checkedIds = checkedIds.filter(i => i !== id);
            } else {
                checkedIds.push(id);
            }
            localStorage.setItem('ok_shopping_checked_ids', JSON.stringify(checkedIds));
            renderCombinedShoppingList();
        }

        function deleteLocalShoppingItem(id) {
            let localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            localItems = localItems.filter(item => item.id !== id);
            localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));
            
            // 同步移除改動數量紀錄
            const modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};
            delete modifiedQtys[id];
            localStorage.setItem('ok_shopping_qtys', JSON.stringify(modifiedQtys));

            renderCombinedShoppingList();
        }

        // 通用分頁切換控制
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-fuji-primary'); btn.classList.add('text-fuji-secondary');
            });
            document.getElementById(`nav-${tabName}`).classList.remove('text-fuji-secondary');
            document.getElementById(`nav-${tabName}`).classList.add('text-fuji-primary');
            if(tabName === 'shopping') { fetchCloudShopping(); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchDay(dayId) {
            document.querySelectorAll('.day-timeline').forEach(el => el.classList.add('hidden'));
            document.getElementById(`day-${dayId}`).classList.remove('hidden');
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.className = "day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm";
            });
            document.getElementById(`btn-${dayId}`).className = "day-btn px-3 py-1.5 bg-fuji-primary text-white rounded-full shadow-sm";
        }

        function initChecklist() {
            const defaultChecklist = [
                { id: 1, text: "中華民國護照 (效期6個月以上)", checked: true },
                { id: 2, text: "日本上網卡 (eSIM / 實體卡)", checked: false },
                { id: 3, text: "日文駕照譯本 ＆ 台灣駕照正本", checked: false }
            ];
            if (!localStorage.getItem('ok_checklist')) localStorage.setItem('ok_checklist', JSON.stringify(defaultChecklist));
            renderChecklist(JSON.parse(localStorage.getItem('ok_checklist')));
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container'); if(!container) return; container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                    <label class="flex items-start gap-3 text-xs text-fuji-dark font-medium py-1">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${item.id})" class="mt-0.5 accent-fuji-primary h-4 w-4 rounded-md">
                        <span class="${item.checked ? 'line-through text-fuji-secondary font-normal' : 'font-bold text-fuji-dark'}">${item.text}</span>
                    </label>`;
            });
        }

        // 小記帳系統與匯率
        function toggleCheck(id) {
            let stored = JSON.parse(localStorage.getItem('ok_checklist'));
            stored = stored.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
            localStorage.setItem('ok_checklist', JSON.stringify(stored));
            renderChecklist(stored);
        }

        function initCalc() {
            const input = document.getElementById('calc-input'); if(!input) return;
            input.addEventListener('input', function() {
                const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
                try {
                    let sanitized = this.value.replace(/[^0-9+\-*/().]/g, '');
                    if(!sanitized) { document.getElementById('calc-jpy').innerText = '0'; document.getElementById('calc-twd').innerText = 'NT$ 0'; return; }
                    let jpy = Function('"use strict";return (' + sanitized + ')')() || 0;
                    jpy = Math.round(jpy);
                    document.getElementById('calc-jpy').innerText = jpy;
                    document.getElementById('calc-twd').innerText = 'NT$ ' + Math.round(jpy * rate).toLocaleString();
                } catch(e) {}
            });
        }

        function addExpense() {
            const title = document.getElementById('expense-title').value.trim() || '未命名開銷';
            const jpy = parseFloat(document.getElementById('expense-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
            if(jpy <= 0) return;
            const expenses = JSON.parse(localStorage.getItem('ok_expenses')) || [];
            expenses.push({ id: Date.now(), title, jpy, twd: Math.round(jpy * rate) });
            localStorage.setItem('ok_expenses', JSON.stringify(expenses));
            document.getElementById('expense-title').value = ''; document.getElementById('expense-amount').value = '';
            loadExpenses();
        }

        function loadExpenses() {
            const expenses = JSON.parse(localStorage.getItem('ok_expenses')) || [];
            const container = document.getElementById('expense-list'); if(!container) return; container.innerHTML = '';
            expenses.forEach(item => {
                container.innerHTML += `
                    <div class="bg-fuji-paper p-3 rounded-xl border border-fuji-light flex justify-between items-center text-xs shadow-sm">
                        <div><strong class="text-fuji-dark">${item.title}</strong> <span class="text-fuji-secondary font-bold">(${item.jpy} JPY)</span></div>
                        <div class="text-fuji-accent font-extrabold text-sm">NT$ ${item.twd}</div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
