<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本沖繩行</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        cute: ['Comic Neue', 'Noto Sans TC', 'sans-serif']
                    },
                    colors: {
                        fuji: {
                            bg: '#F3F7FA',       // 清新空氣藍白
                            paper: '#FFFFFF',    // 純白卡片
                            primary: '#4A7C9D',  // 經典富士山藍
                            secondary: '#8FAEC3',// 輕柔雲朵藍
                            accent: '#F4A261',   // 夕陽蜜柑橘（重要標記）
                            dark: '#2B4251',     // 深海藍黑（文字）
                            light: '#E2EDF3'     // 淺浪花藍
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F3F7FA; color: #2B4251; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fuji-wave { border-style: dashed; border-color: #8FAEC3; }
    </style>
</head>
<body class="font-sans min-h-screen pb-24 flex justify-center">

    <div class="w-full max-w-md bg-fuji-bg min-h-screen shadow-xl relative flex flex-col">
        
        <header class="bg-fuji-primary p-6 pt-8 pb-8 text-center relative rounded-b-[2rem] shadow-md overflow-hidden">
            <div class="absolute -right-6 -top-6 text-fuji-secondary/20 text-7xl"><i class="fa-solid fa-cloud"></i></div>
            <div class="absolute -left-4 top-12 text-fuji-secondary/20 text-5xl"><i class="fa-solid fa-sun"></i></div>
            
            <div class="text-[11px] tracking-widest text-fuji-light font-bold mb-1 font-cute">✨ OKINAWA TRIP MEMO ✨</div>
            <h1 class="font-cute text-3xl font-bold text-white tracking-wide flex items-center justify-center gap-2">
                <i class="fa-solid fa-umbrella-beach text-fuji-accent"></i> 日本沖繩行
            </h1>
            <p class="text-xs text-fuji-light/90 mt-2 bg-white/10 inline-block px-3 py-1 rounded-full backdrop-blur-sm">
                <i class="fa-regular fa-paper-plane mr-1"></i> 沖繩　2026/10/01-10/04
            </p>
        </header>

        <main class="flex-1 p-4 overflow-y-auto">
            
            <section id="page-plan" class="tab-content block">
                <div class="flex justify-between items-center mb-4 pb-2">
                    <h2 class="font-cute text-lg font-bold text-fuji-primary flex items-center gap-1">
                        <i class="fa-solid fa-route text-fuji-accent"></i> 行程時光軸
                    </h2>
                    <div class="flex gap-1.5 text-xs font-bold">
                        <button onclick="switchDay('d1')" id="btn-d1" class="day-btn px-3 py-1.5 bg-fuji-primary text-white rounded-full shadow-sm transition-all">D1</button>
                        <button onclick="switchDay('d2')" id="btn-d2" class="day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm transition-all">D2</button>
                        <button onclick="switchDay('d3')" id="btn-d3" class="day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm transition-all">D3</button>
                        <button onclick="switchDay('d4')" id="btn-d4" class="day-btn px-3 py-1.5 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm transition-all">D4</button>
                    </div>
                </div>

                <div id="loading-status" class="text-center py-12 text-sm text-fuji-secondary font-medium">
                    <i class="fa-solid fa-water fa-bounce mr-2 text-fuji-primary"></i>輕輕划向雲端手帳中...
                </div>

                <div id="day-d1" class="day-timeline space-y-4"></div>
                <div id="day-d2" class="day-timeline space-y-4 hidden"></div>
                <div id="day-d3" class="day-timeline space-y-4 hidden"></div>
                <div id="day-d4" class="day-timeline space-y-4 hidden"></div>
            </section>

            <section id="page-guide" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-4 flex items-center gap-1"><i class="fa-solid fa-map-marked-alt text-fuji-accent"></i> 手帳人文導覽</h2>
                <div class="space-y-6">
                    <article class="bg-fuji-paper p-5 rounded-2xl shadow-sm border border-fuji-light">
                        <span class="text-xs bg-fuji-primary text-white px-2.5 py-1 rounded-full font-bold">🐋 深度文化</span>
                        <h3 class="text-lg font-bold text-fuji-dark mt-2 mb-2">美麗海水族館：黑潮之海</h3>
                        <p class="text-sm text-fuji-dark/90 leading-relaxed mb-4 text-justify">這裡擁有世界第三大的巨大水槽「黑潮之海」。為了承受如此巨大的水壓，水槽的壓克力觀景窗厚度高達 60 公分！</p>
                        <div class="w-full h-48 rounded-2xl overflow-hidden border border-fuji-light shadow-inner">
                            <iframe width="100%" height="100%" frameborder="0" src="https://www.openstreetmap.org/export/embed.html?bbox=127.8752%2C26.6923%2C127.8812%2C26.6963&layer=mapnik&marker=26.6943%2C127.8782"></iframe>
                        </div>
                    </article>
                </div>
            </section>

            <section id="page-wallet" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-4 flex items-center gap-1"><i class="fa-solid fa-coins text-fuji-accent"></i> 隨身小帳本</h2>
                <div class="bg-fuji-paper p-4 rounded-2xl border border-fuji-light shadow-sm mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-xs font-bold text-fuji-primary">自訂日幣匯率 (1 JPY = TWD)</label>
                        <input type="number" id="exchange-rate" value="0.215" step="0.001" class="w-20 px-2 py-1 text-right text-xs border border-fuji-light rounded-lg bg-fuji-bg font-bold text-fuji-primary">
                    </div>
                    <input type="text" id="calc-input" placeholder="小計算機，如: 500+1200" class="w-full px-3 py-2 border border-fuji-light rounded-xl bg-fuji-bg text-sm font-mono focus:outline-none focus:border-fuji-primary">
                    <div class="flex justify-between text-xs px-1 mt-2 font-medium">
                        <span class="text-fuji-secondary">計算: <strong id="calc-jpy" class="text-fuji-dark">0</strong> JPY</span>
                        <span class="text-fuji-secondary">台幣: <strong id="calc-twd" class="text-fuji-accent text-sm">NT$ 0</strong></span>
                    </div>
                </div>
                <div class="bg-fuji-paper p-4 rounded-2xl border border-fuji-light shadow-sm mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <input type="text" id="expense-title" placeholder="買了什麼食物或紀念品？" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                        <input type="number" id="expense-amount" placeholder="日幣金額" class="px-3 py-2 border border-fuji-light rounded-xl text-xs bg-fuji-bg focus:outline-none">
                    </div>
                    <button onclick="addExpense()" class="w-full bg-fuji-primary text-white text-xs font-bold py-2.5 rounded-xl shadow-md hover:bg-fuji-dark transition-all"><i class="fa-solid fa-plus mr-1"></i>記一筆度假開銷</button>
                </div>
                <div id="expense-list" class="space-y-2"></div>
            </section>

            <section id="page-lists" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1"><i class="fa-solid fa-clipboard-check text-fuji-accent"></i> 行前行李檢查點</h2>
                <div id="checklist-container" class="bg-fuji-paper p-5 rounded-2xl border border-fuji-light shadow-sm space-y-3"></div>
            </section>

            <section id="page-info" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-4 flex items-center gap-1"><i class="fa-solid fa-info-circle text-fuji-accent"></i> 實用旅遊資訊</h2>
                <div class="bg-fuji-paper p-6 rounded-2xl border border-fuji-light shadow-sm text-center">
                    <div class="text-4xl text-fuji-primary/30 mb-2"><i class="fa-solid fa-file-signature"></i></div>
                    <p class="text-xs text-fuji-secondary font-medium mb-3">點擊下方直接開啟 Google 試算表App<br>大家可以一齊即時修改行程喔！</p>
                    <a id="edit-sheet-btn" href="#" target="_blank" class="inline-block w-full bg-fuji-accent text-white text-xs font-bold py-3 rounded-xl shadow-md hover:bg-opacity-90 transition-all"><i class="fa-solid fa-pen-to-square mr-1"></i>呼叫 Google 試算表線上編輯</a>
                </div>
            </section>
        </main>

       <!-- FOOTER NAV: 圓潤清爽底欄 (已修正為完美固定在螢幕底部) -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-fuji-paper/95 backdrop-blur-md border-t border-fuji-light flex justify-around items-center py-2 z-50 shadow-lg rounded-t-2xl">
            <button onclick="switchTab('plan')" id="nav-plan" class="nav-btn flex flex-col items-center text-fuji-primary transition-all"><i class="fa-solid fa-compass text-lg"></i><span class="text-[10px] font-bold mt-0.5 font-cute">PLAN</span></button>
            <button onclick="switchTab('guide')" id="nav-guide" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-map-location-dot text-lg"></i><span class="text-[10px] font-bold mt-0.5 font-cute">GUIDE</span></button>
            <button onclick="fixed-wallet" onclick="switchTab('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-wallet text-lg"></i><span class="text-[10px] font-bold mt-0.5 font-cute">WALLET</span></button>
            <button onclick="switchTab('lists')" id="nav-lists" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-check-square text-lg"></i><span class="text-[10px] font-bold mt-0.5 font-cute">LISTS</span></button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-circle-info text-lg"></i><span class="text-[10px] font-bold mt-0.5 font-cute">INFO</span></button>
        </nav>
    </div>

    <script>
        // ==============================================================
        // 1. Google 試算表穩定 CSV 連結 (已完全幫你對應好)
        // ==============================================================
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y/gviz/tq?tqx=out:csv';

        // ==============================================================
        // 2. Google Sheet 一般共同編輯網址 (INFO 頁面按鈕專用)
        // ==============================================================
        const SHEET_EDIT_URL = 'https://docs.google.com/spreadsheets/d/1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y/edit?gid=0#gid=0';

        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.getElementById('edit-sheet-btn');
            if (editBtn) editBtn.href = SHEET_EDIT_URL;
            fetchTravelPlan();
            initChecklist();
            loadExpenses();
        });

        // 抓取 Google Sheet 資料
        async function fetchTravelPlan() {
