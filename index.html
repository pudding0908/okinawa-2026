    <script>
        const SHEET_ID = '1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        // 精準鎖定「購物」工作表
        const SHOPPING_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E8%B3%BC%E7%89%A9`;
        const SHEET_EDIT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=0#gid=0`;

        // 已嵌入最新 GAS 部署網址
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwGeO78Oh1Q4mKGV-8ZzRNcDcZOag8EzbdNFUS7XzfpvDjDg7t6oawOn01-kjTrjQjzVA/exec';

        let cloudShoppingItems = [];
        let currentPostType = 'local'; 

        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.getElementById('edit-sheet-btn');
            if (editBtn) editBtn.href = SHEET_EDIT_URL;
            fetchTravelPlan();
            fetchCloudShopping();
            initChecklist();
            loadExpenses();
            initCalc();
        });

        // 讀取行程
        async function fetchTravelPlan() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                parseAndRenderCSV(csvText);
                document.getElementById('loading-status').classList.add('hidden');
            } catch (error) {
                console.error(error);
            }
        }

        function parseAndRenderCSV(csvText) {
            const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if(lines.length <= 1) return;
            const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
            document.getElementById('day-d1').innerHTML = '';
            document.getElementById('day-d2').innerHTML = '';
            document.getElementById('day-d3').innerHTML = '';
            document.getElementById('day-d4').innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                if(currentLine.length < headers.length) continue;
                let row = {};
                headers.forEach((header, index) => { row[header] = currentLine[index]; });
                if(!row['標題'] && !row['時間起']) continue;
                renderTimelineCard(row);
            }
        }

        function renderTimelineCard(row) {
            let dayValue = (row['Day'] || '').trim().toLowerCase(); 
            if (dayValue.startsWith('d')) { dayValue = 'd' + dayValue.replace(/[^0-9]/g, ''); }
            const containerId = `day-${dayValue}`;
            const targetContainer = document.getElementById(containerId);
            if (!targetContainer) return;

            let timeString = row['時間起'] || '';
            if (row['時間迄']) { timeString += ` - ${row['時間迄']}`; }

            let buttonHtml = '';
            if (row['Google Map']) buttonHtml += `<a href="${row['Google Map']}" target="_blank" class="text-[11px] bg-fuji-bg font-bold px-2.5 py-1 rounded text-fuji-primary border border-fuji-light mr-1.5 inline-flex items-center gap-0.5"><i class="fa-solid fa-location-dot text-fuji-accent"></i>導航</a>`;
            if (row['網頁']) buttonHtml += `<a href="${row['網頁']}" target="_blank" class="text-[11px] bg-fuji-bg font-bold px-2.5 py-1 rounded text-fuji-primary border border-fuji-light mr-1.5 inline-flex items-center gap-0.5"><i class="fa-solid fa-earth-asia"></i>網站</a>`;

            let metaHtml = '';
            if (row['區間費用']) metaHtml += `<span class="inline-block bg-fuji-light text-fuji-primary text-[10px] font-bold px-2 py-0.5 rounded mr-1.5">💰 ${row['區間費用']}</span>`;
            if (row['備註']) metaHtml += `<span class="text-[11px] text-fuji-accent font-bold">💬 ${row['備註']}</span>`;

            let cardHtml = `<div class="bg-fuji-paper p-4 rounded shadow-sm border border-fuji-light hover:border-fuji-secondary transition-all"><div class="flex justify-between items-center text-xs text-fuji-secondary font-bold mb-1"><span class="text-fuji-primary bg-fuji-light px-2 py-0.5 rounded">${timeString}</span>${row['分類'] ? `<span class="text-[10px] bg-fuji-bg px-2 py-0.5 rounded text-fuji-primary border border-fuji-light">${row['分類']}</span>` : ''}</div><h4 class="font-bold text-fuji-dark text-base mt-1.5">${row['標題'] || '未命名行程'}</h4>${row['說明'] ? `<p class="text-xs text-fuji-secondary mt-1.5 text-justify leading-relaxed">${row['說明']}</p>` : ''}<div class="mt-2.5">${metaHtml}</div><div class="mt-2.5">${buttonHtml}</div></div>`;
            
            if (row['分類'] === '重要') {
                cardHtml = `<div class="bg-fuji-accent/10 border-l-4 border-fuji-accent p-4 rounded shadow-sm bg-white"><div class="flex justify-between text-xs text-fuji-accent font-bold mb-1"><span class="bg-fuji-accent text-white px-2 py-0.5 rounded">${timeString}</span><span><i class="fa-solid fa-star fa-spin mr-1"></i>重要提醒</span></div><p class="font-bold text-fuji-dark text-base mt-1.5">${row['標題'] || '未命名行程'}</p>${row['說明'] ? `<p class="text-xs text-fuji-dark/80 mt-1.5 leading-relaxed bg-fuji-bg/50 p-2 rounded text-justify">${row['說明']}</p>` : ''}<div class="mt-2.5">${metaHtml}</div><div class="mt-2.5">${buttonHtml}</div></div>`;
            }
            targetContainer.innerHTML += cardHtml;
        }

        // 🌟 核心修正：精準轉換 Google 雲端硬碟圖片網址為「直連格式」
        function parseImageUrl(url) {
            if (!url) return '';
            let cleanUrl = url.trim();
            if (cleanUrl.includes('drive.google.com')) {
                let fileId = '';
                if (cleanUrl.includes('/file/d/')) {
                    const parts = cleanUrl.split('/file/d/');
                    if (parts[1]) fileId = parts[1].split('/')[0].split('?')[0];
                } else if (cleanUrl.includes('id=')) {
                    const urlParams = new URLSearchParams(cleanUrl.split('?')[1]);
                    fileId = urlParams.get('id') || '';
                }
                if (fileId) return `https://drive.google.com/uc?export=view&id=${fileId}`;
            }
            return cleanUrl;
        }

        // 讀取並動態對齊雲端購物欄位
        async function fetchCloudShopping() {
            try {
                const response = await fetch(SHOPPING_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                
                // 分割行，並利用正則表達式精準分割 CSV 欄位（防止內容包含逗號出錯）
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                cloudShoppingItems = [];
                
                if (lines.length > 1) {
                    const headers = lines[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/["']/g, '').trim());
                    
                    // 動態追蹤試算表目前的欄位順序位置
                    const idxLogo = headers.indexOf("店家 LOGO");
                    const idxStore = headers.indexOf("店家");
                    const idxName = headers.indexOf("商品名稱");
                    const idxQty = headers.indexOf("數量");
                    const idxNote = headers.indexOf("備註");
                    const idxLink = headers.indexOf("連結");
                    const idxImg = headers.indexOf("商品圖片");

                    for(let i = 1; i < lines.length; i++) {
                        const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                        
                        let name = idxName !== -1 ? currentLine[idxName] : '';
                        if (!name || name.trim() === "") continue;

                        let logo = idxLogo !== -1 ? currentLine[idxLogo] : '';
                        let store = idxStore !== -1 ? currentLine[idxStore] : '其他';
                        let qtyStr = idxQty !== -1 ? currentLine[idxQty] : '1';
                        let note = idxNote !== -1 ? currentLine[idxNote] : '';
                        let link = idxLink !== -1 ? currentLine[idxLink] : '';
                        let image = idxImg !== -1 ? currentLine[idxImg] : '';

                        cloudShoppingItems.push({
                            id: 'cloud-' + i,
                            name: name,
                            qty: parseInt(qtyStr) || 1,
                            store: store || '其他購買',
                            logo: parseImageUrl(logo),
                            note: note || '',
                            link: link || '',
                            image: parseImageUrl(image),
                            isCloud: true
                        });
                    }
                }
            } catch (error) {
                console.error("讀取雲端購物異常:", error);
            }
            renderCombinedShoppingList();
        }

        function setPostType(type) {
            currentPostType = type;
            const localBtn = document.getElementById('toggle-type-local');
            const cloudBtn = document.getElementById('toggle-type-cloud');
            const submitBtn = document.getElementById('add-shop-btn');

            if (type === 'local') {
                localBtn.className = "px-3 py-1 rounded-md bg-fuji-primary text-white shadow-2xs transition-all flex items-center gap-1";
                cloudBtn.className = "px-3 py-1 rounded-md text-fuji-secondary transition-all flex items-center gap-1";
                submitBtn.className = "w-full bg-slate-700 text-white text-xs font-bold py-2.5 rounded-lg shadow-sm hover:bg-slate-800 transition-all";
                submitBtn.innerHTML = `<i class="fa-solid fa-plus mr-1"></i>存入個人清單`;
            } else {
                localBtn.className = "px-3 py-1 rounded-md text-fuji-secondary transition-all flex items-center gap-1";
                cloudBtn.className = "px-3 py-1 rounded-md bg-fuji-primary text-white shadow-2xs transition-all flex items-center gap-1";
                submitBtn.className = "w-full bg-red-600 text-white text-xs font-bold py-2.5 rounded-lg shadow-sm hover:bg-red-700 transition-all";
                submitBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-1"></i>同步至雲端`;
            }
        }

        function handleShoppingSubmit() {
            const name = document.getElementById('shop-item-name').value.trim();
            const qty = parseInt(document.getElementById('shop-item-qty').value) || 1;
            const store = document.getElementById('shop-item-store').value.trim() || '其他';
            const noteOrImg = document.getElementById('shop-item-note').value.trim();

            if (!name) { alert('請填寫商品名稱！'); return; }

            if (currentPostType === 'local') {
                const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
                localItems.push({
                    id: 'local-' + Date.now(),
                    name, qty, store, logo: '',
                    note: noteOrImg, image: '', isCloud: false
                });
                localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));
                clearShoppingForm();
                renderCombinedShoppingList();
            } else {
                const submitBtn = document.getElementById('add-shop-btn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i>正在同步至雲端...`;

                let finalNote = noteOrImg;
                let finalImage = '';
                if (noteOrImg.startsWith('http://') || noteOrImg.startsWith('https://')) {
                    finalImage = noteOrImg;
                    finalNote = '';
                }

                const payload = { store, name, qty, note: finalNote, link: '', image: finalImage };

                fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    alert(`🎉 【${name}】已成功加入雲端！約 1 分鐘後將更新完成。`);
                    clearShoppingForm();
                    setTimeout(fetchCloudShopping, 2500);
                }).catch(err => {
                    alert('同步失敗，請檢查網路連線。');
                    console.error(err);
                }).finally(() => {
                    submitBtn.disabled = false;
                    setPostType('cloud');
                });
            }
        }

        function clearShoppingForm() {
            document.getElementById('shop-item-name').value = '';
            document.getElementById('shop-item-qty').value = '1';
            document.getElementById('shop-item-store').value = '';
            document.getElementById('shop-item-note').value = '';
        }

        // 🌟 完全依照 11bd115 版本重新建構的大卡片式排版渲染
        function renderCombinedShoppingList() {
            const container = document.getElementById('shopping-list-container');
            if (!container) return;
            container.innerHTML = '';

            const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            const allItems = [...cloudShoppingItems, ...localItems];

            if (allItems.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-xs text-fuji-secondary font-medium">🛒 清單空空如也。<br>隨手新增項目吧！</div>`;
                return;
            }

            // 依照「店家」進行群組分組
            const storeGroups = {};
            allItems.forEach(item => {
                const storeName = item.store || '其他購買';
                if (!storeGroups[storeName]) {
                    storeGroups[storeName] = { items: [], logo: item.logo || '' };
                }
                if (item.logo && !storeGroups[storeName].logo) {
                    storeGroups[storeName].logo = item.logo;
                }
                storeGroups[storeName].items.push(item);
            });

            // 開始繪製每一個店家的卡片
            for (const [storeName, group] of Object.entries(storeGroups)) {
                
                // 處理店家 LOGO：如果有從雲端抓到直連 LOGO 則顯示，否則預設顯示小商店圖標
                let storeLogoHtml = `<i class="fa-solid fa-shop text-gray-500 mr-2 text-sm"></i>`;
                if (group.logo) {
                    storeLogoHtml = `<img src="${group.logo}" class="w-5 h-5 object-contain mr-2 rounded-sm inline-block" onerror="this.style.display='none'">`;
                }

                let groupHtml = `
                    <div class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden mb-6">
                        <div class="bg-gray-50/80 px-4 py-3 border-b border-gray-100 flex justify-between items-center">
                            <div class="flex items-center font-bold text-sm text-gray-800">
                                ${storeLogoHtml}
                                <span>${storeName}</span>
                            </div>
                            <span class="text-[11px] bg-gray-200/60 text-gray-600 px-2 py-0.5 rounded-full font-medium">
                                ${group.items.length} 件商品
                            </span>
                        </div>
                        <div class="divide-y divide-gray-100">`;

                // 繪製該店家底下的每一項商品 (完美還原精美大圖區塊)
                group.items.forEach(item => {
                    
                    // 處理主要大圖：如果有雲端圖片則使用大卡片呈現，沒有就隱藏或留空
                    let productImgHtml = '';
                    if (item.image && item.image.trim() !== '') {
                        productImgHtml = `
                            <div class="w-full h-48 bg-gray-50 flex items-center justify-center overflow-hidden border-b border-gray-100 relative">
                                <img src="${item.image}" class="w-full h-full object-cover" alt="${item.name}">
                            </div>`;
                    }

                    groupHtml += `
                        <div class="flex flex-col bg-white">
                            ${productImgHtml}
                            
                            <div class="p-4 flex items-start justify-between gap-3">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-1.5 flex-wrap">
                                        <h4 class="font-bold text-base text-gray-800 leading-snug break-words">
                                            ${item.name}
                                        </h4>
                                        ${!item.isCloud ? `<span class="text-[9px] bg-amber-50 text-amber-700 font-bold px-1.5 py-0.5 rounded border border-amber-200">私房</span>` : ''}
                                    </div>
                                    
                                    ${item.note ? `
                                        <div class="text-xs text-gray-500 mt-1 font-medium bg-gray-50 p-2 rounded-lg border border-gray-100 inline-block">
                                            <i class="fa-regular fa-comment-dots mr-1 text-gray-400"></i>${item.note}
                                        </div>` : ''
                                    }
                                </div>

                                <div class="flex items-center gap-2 flex-shrink-0 mt-0.5">
                                    <div class="flex items-center border border-gray-200 rounded-lg bg-gray-50 overflow-hidden shadow-2xs">
                                        <span class="px-3 py-1 text-xs font-extrabold text-gray-700 select-none bg-white border-r border-gray-200">
                                            數量
                                        </span>
                                        <span class="px-3 py-1 text-sm font-black text-slate-800 min-w-[28px] text-center select-none">
                                            ${item.qty}
                                        </span>
                                    </div>
                                    ${!item.isCloud ? `
                                        <button onclick="deleteLocalShoppingItem('${item.id}')" class="text-gray-400 hover:text-red-500 p-1.5 transition-all text-sm bg-gray-50 rounded-lg border border-gray-100">
                                            <i class="fa-regular fa-trash-can"></i>
                                        </button>` : ''
                                    }
                                </div>
                            </div>
                        </div>`;
                });

                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            }
        }

        function deleteLocalShoppingItem(id) {
            let localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            localItems = localItems.filter(item => item.id !== id);
            localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));
            renderCombinedShoppingList();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-fuji-primary'); btn.classList.add('text-fuji-secondary');
            });
            document.getElementById(`nav-${tabName}`).classList.remove('text-fuji-secondary');
            document.getElementById(`nav-${tabName}`).classList.add('text-fuji-primary');
            if(tabName === 'shopping') { fetchCloudShopping(); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchDay(dayId) {
            document.querySelectorAll('.day-timeline').forEach(el => el.classList.add('hidden'));
            document.getElementById(`day-${dayId}`).classList.remove('hidden');
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.className = "day-btn px-3 py-1 bg-fuji-paper text-fuji-primary border border-fuji-light rounded shadow-sm";
            });
            document.getElementById(`btn-${dayId}`).className = "day-btn px-3 py-1 bg-fuji-primary text-white rounded shadow-sm";
        }

        function initChecklist() {
            const defaultChecklist = [
                { id: 1, text: "中華民國護照 (效期6個月以上)", checked: true },
                { id: 2, text: "日本上網卡 (eSIM / 實體卡)", checked: false },
                { id: 3, text: "日文駕照譯本 ＆ 台灣駕照正本", checked: false }
            ];
            if (!localStorage.getItem('ok_checklist')) localStorage.setItem('ok_checklist', JSON.stringify(defaultChecklist));
            renderChecklist(JSON.parse(localStorage.getItem('ok_checklist')));
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container'); if(!container) return; container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                    <label class="flex items-start gap-3 text-xs text-fuji-dark font-medium py-1">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${item.id})" class="mt-0.5 accent-fuji-primary h-4 w-4 rounded">
                        <span class="${item.checked ? 'line-through text-fuji-secondary font-normal' : 'font-bold text-fuji-dark'}">${item.text}</span>
                    </label>`;
            });
        }

        function toggleCheck(id) {
            let stored = JSON.parse(localStorage.getItem('ok_checklist'));
            stored = stored.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
            localStorage.setItem('ok_checklist', JSON.stringify(stored));
            renderChecklist(stored);
        }

        function initCalc() {
            const input = document.getElementById('calc-input'); if(!input) return;
            input.addEventListener('input', function() {
                const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
                try {
                    let sanitized = this.value.replace(/[^0-9+\-*/().]/g, '');
                    if(!sanitized) { document.getElementById('calc-jpy').innerText = '0'; document.getElementById('calc-twd').innerText = 'NT$ 0'; return; }
                    let jpy = Function('"use strict";return (' + sanitized + ')')() || 0;
                    jpy = Math.round(jpy);
                    document.getElementById('calc-jpy').innerText = jpy;
                    document.getElementById('calc-twd').innerText = 'NT$ ' + Math.round(jpy * rate).toLocaleString();
                } catch(e) {}
            });
        }

        function addExpense() {
            const title = document.getElementById('expense-title').value.trim() || '未命名開銷';
            const jpy = parseFloat(document.getElementById('expense-amount').value) || 0;
            const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
            if(jpy <= 0) return;
            const expenses = JSON.parse(localStorage.getItem('ok_expenses')) || [];
            expenses.push({ id: Date.now(), title, jpy, twd: Math.round(jpy * rate) });
            localStorage.setItem('ok_expenses', JSON.stringify(expenses));
            document.getElementById('expense-title').value = ''; document.getElementById('expense-amount').value = '';
            loadExpenses();
        }

        function loadExpenses() {
            const expenses = JSON.parse(localStorage.getItem('ok_expenses')) || [];
            const container = document.getElementById('expense-list'); if(!container) return; container.innerHTML = '';
            expenses.forEach(item => {
                container.innerHTML += `
                    <div class="bg-fuji-paper p-3 rounded border border-fuji-light flex justify-between items-center text-xs shadow-sm">
                        <div><strong class="text-fuji-dark">${item.title}</strong> <span class="text-fuji-secondary font-bold">(${item.jpy} JPY)</span></div>
                        <div class="text-fuji-accent font-extrabold text-sm">NT$ ${item.twd}</div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
