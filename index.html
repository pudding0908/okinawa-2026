    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // 富士藍主題色彩配置（保留原始設定）
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        cute: ['Comic Neue', 'Noto Sans TC', 'sans-serif']
                    },
                    colors: {
                        fuji: {
                            bg: '#F3F7FA',       
                            paper: '#FFFFFF',    
                            primary: '#4A7C9D',  
                            secondary: '#628DA7', 
                            accent: '#F4A261',   
                            dark: '#2B4251',     
                            light: '#E2EDF3'     
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F3F7FA; color: #2B4251; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="font-sans min-h-screen flex justify-center">
    <div class="w-full max-w-md bg-fuji-bg min-h-screen shadow-xl relative flex flex-col">
        <div class="sticky top-0 z-50 bg-fuji-bg w-full">
            <!--大標題(旅遊主題、旅遊時間)-->
            <header class="bg-fuji-primary p-4 text-center relative rounded-b-[1.5rem] shadow-md overflow-hidden">
                <div class="absolute -right-6 -top-6 text-fuji-secondary/20 text-7xl"><i class="fa-solid fa-cloud"></i></div>
                <div class="absolute -left-4 top-12 text-fuji-secondary/20 text-5xl"><i class="fa-solid fa-sun"></i></div>
                <div class="text-[11px] tracking-widest text-fuji-light font-bold mb-0.5 font-cute">✨ 旅遊手帳 TRIP MEMO ✨</div>
                <h1 id="main-title" class="font-cute text-2xl font-bold text-white tracking-wide flex items-center justify-center gap-2"></h1>
                <p id="main-date" class="text-[13px] text-fuji-light/90 mt-1 bg-white/10 inline-block px-2 py-0.5 rounded-full backdrop-blur-sm tracking-wide"></p>
            </header>

            <!--行程日期方塊區-->
            <div id="sticky-day-container" class="pt-3 px-4 block">
                <div id="dynamic-tabs" class="flex flex-nowrap gap-2.5 w-full overflow-x-auto no-scrollbar py-1 justify-start">
                    </div>
            </div>

                <div class="flex flex-nowrap gap-2.5 w-full overflow-x-auto no-scrollbar py-1 justify-start">

                        <span class="text-[17px] opacity-90 pointer-events-none"><span id="text-date-d1">10/1</span></span>

                    </button>
                    <button onclick="switchDay('day-d2')" id="btn-day-d2" class="tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-light bg-fuji-paper text-fuji-primary shadow-2xs hover:bg-fuji-light/40 leading-tight">

                    </button>
                    <button onclick="switchDay('day-d3')" id="btn-day-d3" class="tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-light bg-fuji-paper text-fuji-primary shadow-2xs hover:bg-fuji-light/40 leading-tight">
                        <span class="text-[17px] opacity-70 pointer-events-none"><span id="text-date-d3">10/3</span></span>
                        <span class="text-[10px] font-cute mt-0.5 pointer-events-none"><span id="text-day-d3">Day 3</span></span>
                    </button>
                    <button onclick="switchDay('day-d4')" id="btn-day-d4" class="tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-light bg-fuji-paper text-fuji-primary shadow-2xs hover:bg-fuji-light/40 leading-tight">
                        <span class="text-[17px] opacity-70 pointer-events-none"><span id="text-date-d4">10/4</span></span>

                    </button>
                </div>
            </div> -->
        </div>
        
        <main class="flex-1 p-3 pb-20 overflow-y-auto">
            <!-- tab1.行程 -->
            <section id="page-plan" class="tab-content block">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-route text-fuji-accent"></i> 行程時光軸
                </h2>

                <div id="loading-status" class="text-center py-12 text-xs text-fuji-secondary font-medium">
                    <i class="fa-solid fa-water fa-bounce mr-2 text-fuji-primary"></i>輕輕划向雲端手帳中...
                </div>
                
                <!-- 行程時間軸卡片容器 -->
                <div id="timeline-container" class="space-y-1"></div>
                <!-- <div id="timeline-container" class="space-y-1">
                    <div id="day-d1" class="day-timeline space-y-1"></div>
                    <div id="day-d2" class="day-timeline space-y-1 hidden"></div>
                    <div id="day-d3" class="day-timeline space-y-1 hidden"></div>
                    <div id="day-d4" class="day-timeline space-y-1 hidden"></div>
                </div> -->
            </section>

            <!-- tab2.地圖 -->
            <section id="page-guide" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-map-marked-alt text-fuji-accent"></i> 手帳地圖導覽
                </h2>
                <div class="space-y-4">
                    <article class="bg-fuji-paper p-4 rounded-xl shadow-sm border border-fuji-light">
                        <span class="text-[10px] bg-fuji-primary text-white px-2 py-0.5 rounded-full font-bold">🐋 深度文化</span>
                        <h3 class="text-base font-bold text-fuji-dark mt-1.5 mb-1">美麗海水族館：黑潮之海</h3>
                        <p class="text-xs text-fuji-dark/90 leading-relaxed mb-3 text-justify">這裡擁有世界第三大的巨大水槽「黑潮之海」。水槽的壓克力觀景窗厚度高達 60 公分！</p>
                        <div class="w-full h-40 rounded-xl overflow-hidden border border-fuji-light shadow-inner">
                            <iframe width="100%" height="100%" frameborder="0" src="https://www.openstreetmap.org/export/embed.html?bbox=127.8752%2C26.6923%2C127.8812%2C26.6963&layer=mapnik&marker=26.6943%2C127.8782"></iframe>
                        </div>
                    </article>
                </div>
            </section>

            <!-- tab3.購物 -->
            <section id="page-shopping" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-cart-shopping text-fuji-accent"></i> 購物清單
                </h2>
                
                <div class="bg-fuji-paper rounded-xl border border-fuji-light shadow-sm mb-4 overflow-hidden">
                    <div onclick="toggleSection('shopping-input-fields', 'main-shop-arrow')" class="bg-fuji-light/40 hover:bg-fuji-light/70 px-3 py-2 flex justify-between items-center cursor-pointer select-none transition-all">
                        <div class="text-[15px] font-bold text-fuji-primary"><i class="fa-solid fa-pen-nib mr-1"></i>新增商品品項</div>
                        <i id="main-shop-arrow" class="fa-solid fa-chevron-right text-[10px] transition-transform text-fuji-primary"></i>
                    </div>
                    
                    <div id="shopping-input-fields" class="p-3 space-y-2 border-t border-fuji-light/50 hidden">
                        <div class="flex justify-between items-center">
                            <div class="text-[13px] font-bold text-fuji-secondary"><i class="fa-solid fa-pencil mr-1 text-fuji-primary"></i>輸入品項</div>
                            <div class="flex bg-fuji-bg p-0.5 rounded-lg border border-fuji-light text-[13px] font-bold relative shadow-2xs">
                                <button id="toggle-type-local" onclick="setPostType('local')" class="px-2 py-0.5 rounded-md bg-white text-amber-600 shadow-2xs transition-all flex items-center gap-0.5">
                                    <i class="fa-solid fa-user-lock"></i>個人私人
                                </button>
                                <button id="toggle-type-cloud" onclick="setPostType('cloud')" class="px-2 py-0.5 rounded-md text-fuji-secondary transition-all flex items-center gap-0.5">
                                    <i class="fa-solid fa-cloud-arrow-up"></i>團隊共同
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1">
                            <div class="relative w-full">
                                <input type="text" id="shop-item-store" list="existing-stores-list" oninput="toggleShopStoreClearBtn()" placeholder="點擊選取現有店家，或直接輸入新店家" class="w-full pr-7 px-2.5 py-1.5 border border-fuji-light rounded-lg text-sm bg-fuji-bg focus:outline-none">
                                <button type="button" id="clear-shop-store-btn" onclick="clearShopStoreInput()" class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-fuji-secondary/50 hover:text-rose-500 transition-all">
                                    <i class="fa-solid fa-circle-xmark text-sm"></i>
                                </button>
                            </div>
                            <datalist id="existing-stores-list"></datalist>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-1.5">
                            <input type="text" id="shop-item-name" placeholder="商品名稱 (必填)" class="col-span-2 px-2.5 py-1.5 border border-fuji-light rounded-lg text-sm bg-fuji-bg focus:outline-none">
                            <input type="number" id="shop-item-qty" placeholder="數量" min="1" value="1" class="px-2.5 py-1.5 border border-fuji-light rounded-lg text-sm bg-fuji-bg focus:outline-none text-center font-bold">
                        </div>

                        <button onclick="toggleSection('sec-shop-detail', 'sec-shop-arrow')" class="w-full bg-fuji-light/70 hover:bg-fuji-light border border-fuji-light rounded-lg px-2.5 py-1.5 flex items-center justify-between text-left font-bold text-xs text-fuji-dark transition-all">
                            <span><i class="fa-solid fa-plus text-fuji-primary mr-1"></i>新增詳細資訊 (備註、圖片、連結)</span>
                            <i id="sec-shop-arrow" class="fa-solid fa-chevron-right text-[10px] transition-transform"></i>
                        </button>

                        <div id="sec-shop-detail" class="hidden space-y-2 pt-1 border-t border-dashed border-fuji-light">
                            <input type="text" id="shop-item-note" placeholder="備註說明" class="w-full px-2.5 py-1.5 border border-fuji-light rounded-lg text-sm bg-fuji-bg focus:outline-none">
                            <input type="text" id="shop-item-image" placeholder="商品圖片網址" class="w-full px-2.5 py-1.5 border border-fuji-light rounded-lg text-sm bg-fuji-bg focus:outline-none">
                            <input type="text" id="shop-item-link" placeholder="參考網頁連結" class="w-full px-2.5 py-1.5 border border-fuji-light rounded-lg text-sm bg-fuji-bg focus:outline-none">
                        </div>

                        <button id="add-shop-btn" onclick="handleShoppingSubmit()" class="w-full bg-amber-500 text-white text-sm font-bold py-2 rounded-lg shadow-md hover:bg-amber-600 transition-all">
                            <i class="fa-solid fa-plus mr-1"></i>存入個人清單
                        </button>
                    </div>
                </div>

                <div id="shopping-list-container" class="space-y-4">
                    <div class="text-center py-4 text-xs text-fuji-secondary"><i class="fa-solid fa-spinner fa-spin mr-1"></i>正在為您整理店舖清單...</div>
                </div>
            </section>

            <!-- tab4.錢包 -->
            <section id="page-wallet" class="tab-content hidden text-xs">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-coins text-fuji-accent"></i> 隨身小帳本
                </h2>
                
                <div class="grid grid-cols-12 gap-2 mb-3 items-stretch">
                    <div class="col-span-5 flex flex-col gap-1.5">
                        <button onclick="toggleSection('sec-rate-content', 'sec-rate-arrow')" class="w-full bg-fuji-light/90 hover:bg-fuji-light border border-fuji-primary rounded-xl px-2 py-1.5 flex items-center justify-between text-left font-bold text-fuji-dark transition-all shadow-2xs">
                            <span class="truncate text-[15px]"><i class="fa-solid fa-calculator text-fuji-primary mr-2"></i>匯率計算</span>
                            <i id="sec-rate-arrow" class="fa-solid fa-chevron-right text-[10px] ml-1 transition-transform"></i>
                        </button>
                        <button onclick="toggleSection('sec-form-content', 'sec-form-arrow')" class="w-full bg-fuji-light/90 hover:bg-fuji-light border border-fuji-primary rounded-xl px-2 py-1.5 flex items-center justify-between text-left font-bold text-fuji-dark transition-all shadow-2xs">
                            <span class="truncate text-[15px]"><i class="fa-solid fa-pen text-fuji-primary mr-1"></i>快速記帳</span>
                            <i id="sec-form-arrow" class="fa-solid fa-plus text-[10px] ml-1"></i>
                        </button>
                    </div>

                    <div class="col-span-7 bg-fuji-dark rounded-xl text-white px-3 py-1.5 flex flex-col justify-center shadow-sm relative overflow-hidden">
                        <div class="absolute -right-2 -bottom-2 text-white/5 text-3xl"><i class="fa-solid fa-wallet"></i></div>
                        <div class="flex items-center justify-between border-b border-white/10 pb-0.5 mb-0.5">
                            <span class="text-[13px] text-fuji-light/70 font-bold">總日幣</span>
                            <span id="total-jpy" class="font-cute font-extrabold text-sm text-fuji-light">¥ 0</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-[13px] text-fuji-light/70 font-bold">總台幣</span>
                            <span id="total-twd" class="font-cute font-extrabold text-sm text-fuji-accent">NT$ 0</span>
                        </div>
                    </div>
                </div>

                <div id="sec-rate-content" class="bg-fuji-paper rounded-xl border border-fuji-light shadow-sm p-3 mb-3 hidden space-y-2">
                    <div class="flex items-center justify-between">
                        <label class="font-bold text-fuji-primary">日幣匯率 (1 JPY = TWD)</label>
                        <div class="flex items-center gap-1">
                            <span id="bot-rate-tag" class="text-[13px] bg-emerald-50 text-emerald-700 border border-emerald-200 px-1 py-0.5 rounded hidden">台銀即時</span>
                            <input type="number" id="exchange-rate" value="0.215" step="0.001" oninput="renderExpenses();" class="w-20 px-2 py-0.5 text-right border border-fuji-light rounded bg-fuji-bg font-bold text-fuji-primary">
                        </div>
                    </div>
                    <input type="text" id="calc-input" placeholder="小計算機，如: 500+1200" class="w-full px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg font-mono text-sm focus:outline-none">
                    <div class="flex justify-between px-0.5 font-medium text-fuji-secondary">
                        <span>日幣: <strong id="calc-jpy" class="text-fuji-dark font-cute">0</strong> JPY</span>
                        <span>台幣: <strong id="calc-twd" class="text-fuji-accent text-sm font-cute">NT$ 0</strong></span>
                    </div>
                </div>

                <div id="sec-form-content" class="text-[13px] bg-fuji-paper rounded-xl border border-fuji-light shadow-sm p-3 mb-3 hidden space-y-2.5">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="expense-store" placeholder="店家" class="px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none">
                        <input type="text" id="expense-title" placeholder="購買商品 (必填)" class="px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="expense-date" class="px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none text-fuji-dark">
                        <input type="time" id="expense-time" class="px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none text-fuji-dark">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <select id="expense-currency" class="px-1.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none font-bold text-fuji-dark">
                            <option value="JPY">日幣 (¥)</option>
                            <option value="TWD">台幣 ($)</option>
                        </select>
                        <input type="number" id="expense-amount" placeholder="消費金額" class="col-span-2 px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="expense-method" onchange="toggleCardSelect()" class="px-1.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none text-fuji-dark">
                            <option value="日幣現金">💵 日幣現金</option>
                            <option value="信用卡">💳 信用卡</option>
                            <option value="台幣支付">🇹🇼 台幣</option>
                        </select>
                        <select id="expense-card" disabled class="px-1.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none text-fuji-secondary opacity-50">
                            <option value="">-- 選擇信用卡 --</option>
                            <option value="聯邦吉鶴卡">聯邦吉鶴卡</option>
                            <option value="富邦J卡">富邦J卡</option>
                            <option value="國泰CUBE卡">國泰CUBE卡</option>
                            <option value="玉山熊本熊卡">玉山熊本熊卡</option>
                            <option value="其他卡片">其他卡片</option>
                        </select>
                    </div>
                    <input type="text" id="expense-note" placeholder="備註說明" class="w-full px-2.5 py-1.5 border border-fuji-light rounded-lg bg-fuji-bg focus:outline-none">
                    <button onclick="addExpense()" class="w-full bg-fuji-primary text-white font-bold py-2 rounded-lg shadow-md hover:bg-fuji-dark transition-all">
                        <i class="fa-solid fa-plus mr-1"></i>儲存此筆開銷
                    </button>
                </div>

                <div id="expense-list" class="space-y-3"></div>
            </section>

            <!-- tab5.準備 -->
            <section id="page-lists" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-clipboard-check text-fuji-accent"></i> 行前行李檢查點
                </h2>
                <div id="checklist-container" class="space-y-4">
                    <div class="text-center py-12 text-sm text-fuji-secondary font-medium">
                        <i class="fa-solid fa-spinner fa-spin mr-2 text-fuji-primary"></i>正在同步雲端準備清單...
                    </div>
                </div>
            </section>

            <!-- tab6.資訊 -->
            <section id="page-info" class="tab-content hidden">
                <h2 class="font-cute text-lg font-bold text-fuji-primary mb-3 flex items-center gap-1.5">
                    <i class="fa-solid fa-info-circle text-fuji-accent"></i> 實用旅遊資訊
                </h2>
                <div class="bg-fuji-paper p-5 rounded-xl border border-fuji-light shadow-sm text-center">
                    <div class="text-3xl text-fuji-primary/30 mb-1"><i class="fa-solid fa-file-signature"></i></div>
                    <p class="text-xs text-fuji-secondary font-medium mb-3">點擊下方直接開啟 Google 試算表App<br>大家可以一齊即時修改行程喔！</p>
                    <a id="edit-sheet-btn" href="https://docs.google.com/spreadsheets/d/1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y/edit?gid=398563289#gid=398563289" target="_blank" class="inline-block w-full bg-fuji-accent text-white text-xs font-bold py-2.5 rounded-lg shadow-md hover:bg-opacity-90 transition-all"><i class="fa-solid fa-pen-to-square mr-1"></i>呼叫 Google 試算表線上編輯</a>
                </div>
            </section>
        </main>

        <!-- tab總覽 -->
        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-fuji-paper/95 backdrop-blur-md border-t border-fuji-light flex justify-around items-center py-1.5 z-50 shadow-lg rounded-t-xl px-1">
            <button onclick="switchTab('plan')" id="nav-plan" class="nav-btn flex flex-col items-center text-fuji-accent transition-all"><i class="fa-solid fa-compass text-sm"></i><span class="text-[13px] font-bold mt-0.5">行程</span></button>
            <button onclick="switchTab('guide')" id="nav-guide" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-map-location-dot text-sm"></i><span class="text-[13px] font-bold mt-0.5">地圖</span></button>
            <button onclick="switchTab('shopping')" id="nav-shopping" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-cart-shopping text-sm"></i><span class="text-[13px] font-bold mt-0.5">購物</span></button>
            <button onclick="switchTab('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-wallet text-sm"></i><span class="text-[13px] font-bold mt-0.5">錢包</span></button>
            <button onclick="switchTab('lists')" id="nav-lists" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-check-square text-sm"></i><span class="text-[13px] font-bold mt-0.5">準備</span></button>

    <script>
        const SHEET_ID = '1XAGAHo-T9l8SsG3wFu5rcXd4dIkZORlhcRZLblMvMJk';  // 更換google sheet來源需修改
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxETmqyNvOn0FJ-trP0DY75-FjQonkX3L4s4DSxoslxBV98Px2S2CtPYHqaS3KRj0nI/exec';  // 更換google sheet來源需修改 (Apps Script)
        
        const SHEET_EDIT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=0#gid=0`;
        const THEME_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E4%B8%BB%E9%A1%8C`; //「主題」資料來源
        const SUMMARY_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E6%91%98%E8%A6%81`;  //「摘要」資料來源
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E8%A1%8C%E7%A8%8B`;  //「行程」資料來源
        const SHOPPING_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E8%B3%BC%E7%89%A9`;  //「購物」資料來源
        const CHECKLIST_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E6%BA%96%E5%82%99`;  //「準備」資料來源

        let cloudShoppingItems = [];
        let currentPostType = 'local'; 
        let walletCollapsedDays = {};
        let shoppingCollapsedStores = {};
        // 儲存行前準備各區域卡片的折疊狀態 (預設皆改為 true 收合)
        let checklistCollapsedCategories = {};
        // 全域儲存從雲端下載並轉化後的準備清單陣列
        let globalChecklistItems = [];

        // 🔄 關閉瀏覽器自動滾動恢復記憶，確保重新載入時完全聽從 JS 的置頂指令
        if ('scrollRestoration' in history) {

        document.addEventListener('DOMContentLoaded', () => {

        });

        // #region 全域--------------------------------------------------------------------------------------
        // 1.抓取雲端「主題」頁籤資料並動態替換網頁標題與時間
        async function fetchCloudTheme() {
            try {
                const response = await fetch(THEME_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                
                const cleanCsvText = csvText.replace(/^\uFEFF/g, '');
                const lines = cleanCsvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                
                if (lines.length > 0) {
                    let titleText = '';
                    let dateText = '';
                    
                    // 逐行巡檢，尋找 A 欄包含「旅遊主題」或「旅遊時間」的列
                    lines.forEach(line => {
                        let cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        cols = cols.map(v => v.trim().replace(/^["']|["']$/g, '').trim());
                        
                        if (cols[0] === '旅遊主題' && cols[1]) { titleText = cols[1]; }
                        if (cols[0] === '旅遊時間' && cols[1]) { dateText = cols[1]; }
                    });
                    
                    // 替換網頁上的文字
                    if (titleText) {
                         // 1. 瀏覽器分頁標題
                        document.title = `${titleText}`; 
                        
                        // 2. 網頁大標題
                        const mainTitleEl = document.getElementById('main-title');
                        if (mainTitleEl) {
                            mainTitleEl.innerHTML = `<i class="fa-solid fa-umbrella-beach text-fuji-accent"></i>${titleText}`;
                        }
                    }
                    
                    if (dateText) {
                        // 3. 網頁副標題時間
                        const mainDateEl = document.getElementById('main-date');
                        if (mainDateEl) {
                            mainDateEl.innerHTML = `<i class="fa-regular fa-calendar-days mr-1 text-fuji-accent"></i>${dateText}`;
                        }
                    }
                }
            } catch (error) {
                console.error("主題雲端讀取異常", error);
            }
        }

        // 1. 全域變數：記錄當前存在的所有天數 ID 列表，供切換與預設置頂使用
        let dynamicDayIdList = [];

        // 🔄 2.抓取雲端「摘要」頁籤資料並【完全動態生成】所有天數方塊按鈕與行程容器
        async function fetchCloudSummary() {
            try {
                const response = await fetch(SUMMARY_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                
                const cleanCsvText = csvText.replace(/^\uFEFF/g, '');
                const lines = cleanCsvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                
                if (lines.length > 1) {
                    const headers = lines[0].split(',').map(h => h.replace(/^["']|["']$/g, '').trim());
                    const idxDay  = headers.indexOf('Day');
                    const idxDate = headers.indexOf('日期');
                    
                    if (idxDay === -1 || idxDate === -1) return;
                    
                    const tabsContainer = document.getElementById('dynamic-tabs');
                    const timelineContainer = document.getElementById('timeline-container');
                    if (!tabsContainer || !timelineContainer) return;
                    
                    // 清空原有內容，準備重新生成
                    tabsContainer.innerHTML = '';
                    timelineContainer.innerHTML = '';
                    dynamicDayIdList = []; // 重置天數列表
                    
                    for (let i = 1; i < lines.length; i++) {
                        let cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        cols = cols.map(v => v.trim().replace(/^["']|["']$/g, '').trim());
                        
                        if (cols.length < headers.length) continue;
                        
                        let rawDay = cols[idxDay];
                        let rawDate = cols[idxDate] || '';
                        if (!rawDay) continue;
                        
                        // ⚡ 日期格式化 (2026/10/01 -> 10/1)
                        let cleanDate = rawDate;
                        if (rawDate.includes('/')) {
                            const parts = rawDate.split('/');
                            if (parts.length === 3) cleanDate = `${parseInt(parts[1])}/${parseInt(parts[2])}`;
                            else if (parts.length === 2) cleanDate = `${parseInt(parts[0])}/${parseInt(parts[1])}`;
                        }
                        
                        // ⚡ 天數格式化
                        let cleanDay = rawDay.toLowerCase();
                        let pureNum = cleanDay.replace(/[^0-9]/g, '');
                        if (/^[0-9]+$/.test(cleanDay)) {
                            cleanDay = 'Day ' + cleanDay;
                        } else if (cleanDay.startsWith('d')) {
                            cleanDay = 'Day ' + pureNum;
                        } else {
                            cleanDay = rawDay;
                        }
                        
                        // 生成完美匹配的目標 ID (例如: day-d1, day-d2)
                        const dId = `day-d${pureNum}`;
                        dynamicDayIdList.push(dId);
                        const isFirst = (dynamicDayIdList.length === 1);
                        
                        // 生成動態按鈕樣式
                        let buttonHtml = '';
                        if (isFirst) {
                            buttonHtml = `
                                <button onclick="switchDay('${dId}')" id="btn-${dId}" class="tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-primary/20 bg-fuji-primary text-white shadow-xs leading-tight">
                                    <span class="text-[17px] opacity-90 pointer-events-none">${cleanDate}</span>
                                    <span class="text-[10px] font-cute mt-0.5 pointer-events-none">${cleanDay}</span>
                                </button>
                            `;
                        } else {
                            buttonHtml = `
                                <button onclick="switchDay('${dId}')" id="btn-${dId}" class="tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-light bg-fuji-paper text-fuji-primary shadow-2xs hover:bg-fuji-light/40 leading-tight">
                                    <span class="text-[17px] opacity-70 pointer-events-none">${cleanDate}</span>
                                    <span class="text-[10px] font-cute mt-0.5 pointer-events-none">${cleanDay}</span>
                                </button>
                            `;
                        }
                        tabsContainer.insertAdjacentHTML('beforeend', buttonHtml);
                        
                        // 同步生成行程放置的大盒子，第一天預設顯示，其他預設 hidden 隱藏
                        const displayClass = isFirst ? "day-timeline space-y-1" : "day-timeline space-y-1 hidden";
                        const containerHtml = `<div id="${dId}" class="${displayClass}"></div>`;
                        timelineContainer.insertAdjacentHTML('beforeend', containerHtml);
                    }
                }
                
                // 渲染原本摘要的其他純文字
                renderSummary(csvText);
            } catch (error) {
                console.error("摘要動態生成異常", error);
            }
        }

        //收合區塊
        function toggleSection(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            if (!content) return;
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                if (arrow) arrow.className = "fa-solid fa-chevron-down text-[10px] transition-transform";
            } else {
                content.classList.add('hidden');
                if (arrow) arrow.className = "fa-solid fa-chevron-right text-[10px] transition-transform";
            }
        }
        
        // 切換頁籤
        // 修改後的動態相容版頁籤切換
        function switchTab(tabName) {
            const currentActiveEl = document.querySelector('.tab-content:not(.hidden)');
            const prevTab = currentActiveEl ? currentActiveEl.id.replace('page-', '') : '';
            
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${tabName}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-fuji-primary', 'text-fuji-accent');
                btn.classList.add('text-fuji-secondary');
            });
            
            const activeNav = document.getElementById(`nav-${tabName}`);
            if (activeNav) {
                activeNav.classList.remove('text-fuji-secondary');
                activeNav.classList.add('text-fuji-accent');
            }
            
            const dayBox = document.getElementById('sticky-day-container');
            if (dayBox) {
                if (tabName === 'plan' || tabName === 'guide') {
                    dayBox.style.display = ''; 
                    // 切換回來時，防呆回到動態抓到的第一天
                    if (prevTab !== '' && prevTab !== 'plan' && prevTab !== 'guide') {
                        if (dynamicDayIdList.length > 0) {
                            switchDay(dynamicDayIdList[0]);
                        }
                    }
                } else {
                    dayBox.style.display = 'none'; 
                }
            }
            
            if(tabName === 'shopping') fetchCloudShopping();
            if(tabName === 'wallet') renderExpenses();
            if(tabName === 'lists') fetchCloudChecklist();
            
            if (tabName === 'plan') {
                window.scrollTo({ top: 0, behavior: 'instant' });
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        // #endregion 全域-----------------------------------------------------------------------------------


        // #region tab1.行程---------------------------------------------------------------------------------
        // 切換日期天數方塊
        function switchDay(dayId) {
            // 1. 隱藏所有行程的 Day 容器
            document.querySelectorAll('.day-timeline').forEach(el => el.classList.add('hidden'));
            
            // 2. 顯示點選的 Day 容器
            const targetEl = document.getElementById(dayId);
            if (targetEl) targetEl.classList.remove('hidden');
            
            // 3. 還原所有頁籤按鈕為「未選取」的淡色正方形樣式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-light bg-fuji-paper text-fuji-primary shadow-2xs hover:bg-fuji-light/40 leading-tight";
            });
            
            // 4. 精準將當前點選的按鈕切換為「深藍色選取」樣式
            const activeBtn = document.getElementById('btn-' + dayId);
            if (activeBtn) {
                activeBtn.className = "tab-btn w-14 h-14 flex-shrink-0 flex flex-col items-center justify-center rounded-xl transition-all border border-fuji-primary/20 bg-fuji-primary text-white shadow-xs leading-tight";
            }

            // 🎯 需求新增：切換天數時，頁面立刻強制回到最上方
            window.scrollTo({
                top: 0,
                behavior: 'instant'
            });
        }

        // 行程時間軸卡片
        async function fetchTravelPlan() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                // 延遲一下下確保 fetchCloudSummary 的容器都已經動態生出來了
                setTimeout(() => {
                    parseAndRenderCSV(csvText);
                    const loader = document.getElementById('loading-status');
                    if (loader) loader.classList.add('hidden');
                }, 100);
                
            } catch (error) {
                console.error("行程讀取失敗", error);
            }
        }

        // 行程時間軸
        function parseAndRenderCSV(csvText) {
            const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if(lines.length <= 1) return;
            
            const headers = lines[0].split(',').map(h => h.replace(/^["']|["']$/g, '').trim());
            
            // 🔥 動態清洗：自動抓出畫面上所有生出來的天數大盒子，並將裡面的內容清空
            document.querySelectorAll('.day-timeline').forEach(el => {
                el.innerHTML = '';
            });

            for (let i = 1; i < lines.length; i++) {
                let currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                currentLine = currentLine.map(v => v.trim().replace(/^["']|["']$/g, '').trim());
                if(currentLine.length < headers.length) continue;
                
                let row = {};
                headers.forEach((header, index) => {
                    row[header] = currentLine[index];
                });

                if(!row['標題'] && !row['時間起']) continue;
                renderTimelineCard(row);
            }
        }

        // 行程小卡內容配置
        function renderTimelineCard(row) {
            let dayValue = (row['Day'] || '').trim().toLowerCase(); 
            
            // 如果試算表填的是純數字（如 1, 2），自動幫它補上 'd' 變成 d1, d2
            if (/^[0-9]+$/.test(dayValue)) { dayValue = 'd' + dayValue; }

            if (dayValue.startsWith('d')) { dayValue = 'd' + dayValue.replace(/[^0-9]/g, ''); }
            const containerId = `day-${dayValue}`;
            const targetContainer = document.getElementById(containerId);
            if (!targetContainer) 
                return;

            // 隨機生成唯一 ID，供「更多資訊」收合功能使用
            const uniqueId = 'detail-' + Math.random().toString(36).substr(2, 9);

            // 1. 取得起迄時間資料
            let timeStart = row['時間起'] || '';
            let timeEnd = row['時間迄'] || '';

            // 處理導航與網站按鈕
            let buttonHtml = '';
            if (row['Google Map']) buttonHtml += `<a href="${row['Google Map']}" target="_blank" class="text-[13px] bg-white font-bold px-2 py-0.5 rounded-full text-fuji-primary border border-fuji-light mr-1 inline-flex items-center gap-0.5 shadow-3xs">
                                                      <i class="fa-solid fa-location-dot text-fuji-accent"></i>導航</a>`;
            if (row['網頁']) buttonHtml += `<a href="${row['網頁']}" target="_blank" class="text-[13px] bg-white font-bold px-2 py-0.5 rounded-full text-fuji-primary border border-fuji-light mr-1 inline-flex items-center gap-0.5 shadow-3xs">
                                                <i class="fa-solid fa-earth-asia"></i>網站</a>`;

            // 2. 建立「區間、費用」文字段落
            let metaHtml = '';
            if (row['區間']) metaHtml += `<span class="text-fuji-secondary text-[13px] mr-2 inline-flex items-center gap-0.5">
                                            <i class="fa-regular fa-clock text-[13px]"></i>${row['區間']}
                                          </span>`;
            if (row['費用']) metaHtml += `<span class="text-fuji-secondary text-[13px] mr-2">💴 ${row['費用']}</span>`;
            
            // 判斷是否為重要行程
            const isImportant = row['分類'] === '重要';

            // 3. 檢查並建立「▶ 更多資訊」收合區塊
            let hasMoreInfo = !!(row['備註'] || row['Google Map'] || row['網頁']);
            let toggleBtnHtml = '';
            let expandableHtml = '';

            if (hasMoreInfo) {
                toggleBtnHtml = `
                    <button onclick="document.getElementById('${uniqueId}').classList.toggle('hidden'); this.querySelector('.arrow-icon').classList.toggle('rotate-90');" 
                            class="text-[13px] text-fuji-primary/80 font-bold hover:text-fuji-primary inline-flex items-center gap-0.5 transition-all focus:outline-none ml-1">
                        <i class="fa-solid fa-caret-right arrow-icon transition-transform duration-200"></i>更多資訊
                    </button>
                `;
                
                // 重要分類展開區塊使用與卡片同色系的深橘設定，一般分類維持富士灰藍
                let expandBgClass = isImportant ? 'bg-[rgb(255_225_175_/_70%)] border-amber-300/60' : 'bg-fuji-light/50 border-fuji-light';
                
                expandableHtml = `
                    <div id="${uniqueId}" class="hidden mt-2 p-3 ${expandBgClass} border rounded-xl shadow-inner transition-all">
                        ${row['備註'] ? `<div class="text-[13px] text-fuji-dark font-medium mb-1.5"> ${row['備註']}</div>` : ''}
                        ${buttonHtml ? `<div class="flex flex-wrap items-center mt-1">${buttonHtml}</div>` : ''}
                    </div>
                `;
            }

            // 處理行程圖片
            let imgUrl = row['圖片'] || row['Image'] || '';
            let imgHtml = '';
            if (imgUrl && imgUrl.trim() !== '') {
                let cleanImgUrl = parseImageUrl(imgUrl);
                imgHtml = `<div class="mt-2.5 rounded-xl overflow-hidden border border-fuji-light/60 max-h-48 shadow-2xs bg-white">
                               <img src="${cleanImgUrl}" referrerpolicy="no-referrer" class="w-full h-full object-cover" alt="行程圖片"></div>`;
            }

            // 處理分類標籤佈局
            let categoryHtml = '';
            const catText = row['分類'] ? row['分類'].trim() : '';
            if (catText) {
                let tagColorClass = 'bg-fuji-bg text-fuji-primary border border-fuji-light'; // 預設
                
                if (isImportant) {
                    tagColorClass = 'bg-fuji-accent text-white border-transparent';
                } else if (catText.includes('美食') || catText.includes('吃')) {
                    tagColorClass = 'bg-rose-50 text-rose-600 border border-rose-200/60';
                } else if (catText.includes('景點') || catText.includes('玩')) {
                    tagColorClass = 'bg-emerald-50 text-emerald-600 border border-emerald-200/60';
                } else if (catText.includes('交通') || catText.includes('飛機') || catText.includes('自駕')) {
                    tagColorClass = 'bg-sky-50 text-sky-600 border border-sky-200/60';
                } else if (catText.includes('飯店') || catText.includes('住')) {
                    tagColorClass = 'bg-indigo-50 text-indigo-600 border border-indigo-200/60';
                } else if (catText.includes('購物') || catText.includes('買')) {
                    tagColorClass = 'bg-amber-50 text-amber-600 border border-amber-200/60';
                }

                categoryHtml = `<span class="${tagColorClass} px-1.5 py-0.5 rounded-full text-[13px] font-bold whitespace-nowrap ml-2">${row['分類']}</span>`;
            } else if (isImportant) {
                categoryHtml = `<span class="text-fuji-accent text-[13px] whitespace-nowrap ml-2">
                                    <i class="fa-solid fa-star fa-spin mr-0.5"></i>重要</span>`;
            }

            // 重要分類內部的資訊分隔線顏色調整
            let metaBorderClass = isImportant ? 'border-amber-300/50' : 'border-fuji-light/40';

            let cardHtml = `
                <div class="relative flex gap-2.5 pl-1 group">
                    <div class="w-12 text-right flex-shrink-0 flex flex-col justify-between text-[15px] text-fuji-secondary/50 font-cute pr-1 pt-3 pb-4 leading-tight">
                        <div>${timeStart}</div>
                        <div class="text-fuji-secondary/50 font-normal">${timeEnd}</div>
                    </div>

                    <div class="flex flex-col items-center flex-shrink-0 w-3 relative">
                        <div class="absolute top-0 bottom-0 w-0.5 bg-fuji-primary/20 group-last:bottom-auto group-last:h-5"></div>
                        <div class="z-10 w-2.5 h-2.5 rounded-full mt-4 border-2 shadow-2xs transition-all ${
                            isImportant 
                            ? 'bg-fuji-accent border-fuji-accent ring-4 ring-fuji-accent/20 animate-pulse' 
                            : 'bg-white border-fuji-primary'
                        }"></div>
                    </div>

                    <div class="flex-1 min-w-0 pb-4">
                        <div class="p-3 rounded-xl shadow-2xs border transition-all ${
                            isImportant 
                            ? 'bg-[rgb(255_238_207_/_60%)] border-fuji-accent/60 shadow-xs' 
                            : 'bg-fuji-paper border-fuji-light'
                        }">
                            
                            <div class="flex justify-between items-start w-full">
                                <h4 class="font-bold text-fuji-dark text-[17px] tracking-wide leading-tight flex-1 min-w-0 break-all">${row['標題'] || '未命名行程'}</h4>

        function parseImageUrl(url) {

            if (cleanUrl.includes('drive.google.com')) {

                if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return cleanUrl;
        }

        // 購物清單 (改為動態追蹤中文字欄位名稱，位置隨便排都讀得到)
        async function fetchCloudShopping() {
            try {
                const response = await fetch(SHOPPING_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                
                // 清除 Google 導出可能帶有的隱形 BOM 字元
                const cleanCsvText = csvText.replace(/^\uFEFF/g, '');
                const lines = cleanCsvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                cloudShoppingItems = [];
                
                if (lines.length > 1) {
                    // 1. 抓取第一列標題，並清洗外層雙引號
                    const headers = lines[0].split(',').map(h => h.replace(/^["']|["']$/g, '').trim());
                    
                    // 2. 自動找出各個欄位名稱對應的索引位置 (Index)
                    const idxLogo  = headers.indexOf('店家 LOGO');
                    const idxStore = headers.indexOf('店家');
                    const idxName  = headers.indexOf('商品');
                    const idxQty   = headers.indexOf('數量');
                    const idxNote  = headers.indexOf('備註');
                    const idxLink  = headers.indexOf('連結');
                    const idxImg   = headers.indexOf('商品圖片');

                    // 3. 安全防呆：如果最重要的「商品」欄位字眼都找不到，就無法解析
                    if (idxName === -1) {
                        console.error("購物試算表中找不到『商品』欄位名稱！");
                        renderCombinedShoppingList();
                        return;
                    }

                    for (let i = 1; i < lines.length; i++) {
                        let currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                        currentLine = currentLine.map(v => v.trim().replace(/^["']|["']$/g, '').trim());
                        
                        if (currentLine.length < headers.length) continue;

                        // 4. 利用動態索引安全抓取資料，若欄位不存在則回傳空字串
                        const itemName = idxName !== -1 ? currentLine[idxName] : '';
                        if (!itemName) continue; // 沒有品項名稱就跳過

                        const storeName = (idxStore !== -1 && currentLine[idxStore]) ? currentLine[idxStore] : '其他待辦';
                        if (shoppingCollapsedStores[storeName] === undefined) {
                            shoppingCollapsedStores[storeName] = true;
                        }

                        cloudShoppingItems.push({
                            id: 'cloud-' + i,
                            logo: (idxLogo !== -1 && currentLine[idxLogo]) ? parseImageUrl(currentLine[idxLogo]) : '',
                            store: storeName,
                            name: itemName,
                            qty: idxQty !== -1 ? (parseInt(currentLine[idxQty]) || 1) : 1,
                            note: idxNote !== -1 ? (currentLine[idxNote] || '').substring(0, 40) : '',
                            link: (idxLink !== -1 && currentLine[idxLink]) ? currentLine[idxLink] : '',
                            image: (idxImg !== -1 && currentLine[idxImg]) ? parseImageUrl(currentLine[idxImg]) : '',
                            isCloud: true
                        });
                    }
                }
            } catch (error) {
                console.error("雲端讀取異常", error);
            }
            renderCombinedShoppingList();
        }

            const item = [...cloudShoppingItems, ...(JSON.parse(localStorage.getItem('ok_shopping_local')) || [])].find(i => i.id === id);

            renderCombinedShoppingList();

        // 記帳 選擇日期與時間
        function initWalletDateTime() {
            const now = new Date();
            const localDate = now.toISOString().split('T')[0];
            const localTime = now.toTimeString().split(' ')[0].substring(0, 5);
            document.getElementById('expense-date').value = localDate;
            document.getElementById('expense-time').value = localTime;
        }

        // 記帳 選擇支付方式
        function toggleCardSelect() {
            const method = document.getElementById('expense-method').value;
            const cardSelect = document.getElementById('expense-card');
            if (method === '信用卡') {
                cardSelect.disabled = false;
                cardSelect.className = "px-1.5 py-1.5 border border-fuji-light rounded-lg text-xs bg-fuji-bg focus:outline-none text-fuji-dark opacity-100";
            } else {
                cardSelect.disabled = true; cardSelect.value = "";

        // 讀取記帳明細
        function renderExpenses() {
            const container = document.getElementById('expense-list'); if (!container) return; container.innerHTML = '';
            const expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
            const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;

            let totalJpy = 0; let totalTwd = 0;
            expenses.forEach(exp => {
                if (exp.currency === 'JPY') { totalJpy += exp.amount; totalTwd += exp.amount * rate; }
                else { totalTwd += exp.amount; totalJpy += exp.amount / rate; }
            });
            document.getElementById('total-jpy').innerHTML = `¥${Math.round(totalJpy).toLocaleString()}`;
            document.getElementById('total-twd').innerHTML = `NT$ ${Math.round(totalTwd).toLocaleString()}`;

            if (expenses.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-xs text-fuji-secondary font-medium">🪙 隨身小帳本尚無資料。<br>點擊上方快速記帳吧！</div>`; 
                return;
            }

            expenses.sort((a, b) => {
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return b.time.localeCompare(a.time);
            });

            const dateGroups = {};
            expenses.forEach(exp => {
                if (!dateGroups[exp.date]) dateGroups[exp.date] = [];
                dateGroups[exp.date].push(exp);
            });

            for (const [date, items] of Object.entries(dateGroups)) {
                let dayTotalTwd = 0;
                items.forEach(item => {
                    if (item.currency === 'JPY') dayTotalTwd += item.amount * rate;
                    else dayTotalTwd += item.amount;
                });

                const isCollapsed = walletCollapsedDays[date] === true;
                const arrowIcon = isCollapsed ? 'fa-chevron-right' : 'fa-chevron-down';

                let groupHtml = `
                    <div class="space-y-1.5">
                        <div onclick="toggleDayCollapse('${date}')" class="text-xs font-bold text-white bg-fuji-primary rounded-xl px-2.5 py-1.5 flex items-center justify-between cursor-pointer select-none mt-2 shadow-2xs">
                            <div class="flex items-center gap-1">
                                <i class="fa-solid ${arrowIcon} text-fuji-light text-[15px] transition-transform"></i>
                                <span class="text-[15px]"><i class="fa-regular fa-calendar-days text-[15px]"></i> ${date}</span>
                            </div>
                            <div class="text-[13px] bg-white text-fuji-dark px-2 py-0.5 rounded font-cute">
                                當天小計: NT$ ${Math.round(dayTotalTwd).toLocaleString()}
                            </div>
                        </div>
                        <div class="${isCollapsed ? 'hidden' : ''} bg-fuji-paper rounded-xl border border-fuji-light shadow-sm overflow-hidden divide-y divide-fuji-light bg-white">`;
                
                items.forEach(item => {
                    const isJpy = item.currency === 'JPY';
                    const displayAmt = isJpy ? `¥${item.amount.toLocaleString()}` : `$${item.amount.toLocaleString()}`;
                    const subAmt = isJpy ? `約 $${Math.round(item.amount * rate)}` : `約 ¥${Math.round(item.amount / rate)}`;

                    groupHtml += `
                        <div class="p-3 flex justify-between items-center gap-2 hover:bg-fuji-bg/20 transition-all">
                            <div class="min-w-0 flex-1 space-y-1">
                                <div class="flex items-center gap-1.5 flex-wrap">
                                    <span class="text-[13px] bg-fuji-primary text-white px-1.5 py-0.5 rounded font-bold inline-flex items-center gap-0.5 flex-shrink-0">
                                        <i class="fa-solid fa-store text-[10px]"></i> ${item.store}
                                    </span>
                                    <span class="font-bold text-[15px] text-fuji-dark break-all">${item.title}</span>
                                </div>
                                
                                <div class="text-[13px] text-fuji-secondary font-medium flex items-center gap-1.5 flex-wrap">
                                    <span><i class="fa-regular fa-clock text-[13px]"></i> ${item.time}</span>
                                    <span>•</span>
                                    <span class="font-bold bg-fuji-light/70 px-2 py-0.2 rounded text-fuji-dark">${item.method}${item.card ? ` (${item.card})` : ''}</span>
                                </div>
                                ${item.note ? `<div class="text-[13px] text-fuji-secondary font-medium break-all pt-0.5">${item.note}</div>` : ''}
                            </div>
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <div class="text-right">
                                    <div class="font-cute font-extrabold text-sm text-fuji-dark">${displayAmt}</div>
                                    <div class="text-[13px] text-fuji-secondary font-semibold">${subAmt}</div>
                                </div>
                                <button onclick="deleteExpense('${item.id}')" class="text-fuji-secondary hover:text-fuji-accent p-1.5 transition-all text-xs">
                                    <i class="fa-regular fa-trash-can text-[13px]"></i>
                                </button>
                            </div>
                        </div>`;
                });
                groupHtml += `</div></div>`; container.innerHTML += groupHtml;
            }
        }

        // 刪除單筆記帳明細
        function deleteExpense(id) {
            if (confirm('確定要移除此筆開銷紀錄嗎？')) {
                let expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
                expenses = expenses.filter(exp => exp.id !== id);
                localStorage.setItem('ok_wallet_expenses_v3', JSON.stringify(expenses));
                renderExpenses();  // 讀取記帳明細
            }
        }

        // 記帳 幣值轉換
        function initCalc() {
            const input = document.getElementById('calc-input'); if(!input) return;
            input.addEventListener('input', function() {
                const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
                try {
                    let sanitized = this.value.replace(/[^0-9+\-*/().]/g, '');
                    if(!sanitized) { document.getElementById('calc-jpy').innerText = '0'; document.getElementById('calc-twd').innerText = 'NT$ 0'; return; }
                    let jpy = Function('"use strict";return (' + sanitized + ')')() || 0;
                    jpy = Math.round(jpy); document.getElementById('calc-jpy').innerText = jpy;
                    document.getElementById('calc-twd').innerText = 'NT$ ' + Math.round(jpy * rate).toLocaleString();
                } catch(e) {}
            });
        }
        // #endregion tab4.錢包------------------------------------------------------------------------------
        

        // #region tab5.準備---------------------------------------------------------------------------------
        // 準備清單 大分類區塊收合
        function toggleChecklistCategoryCollapse(catName) {
            checklistCollapsedCategories[catName] = !checklistCollapsedCategories[catName];
            renderChecklist(globalChecklistItems);
        }

        // 初始化時同步抓取雲端「行李」清單
        async function fetchCloudChecklist() {
            try {
                // 強制加上時間戳記防止瀏覽器快取舊資料
                const response = await fetch(`${CHECKLIST_CSV_URL}&nocache=${Date.now()}`);
                if (!response.ok) throw new Error("網路讀取失敗");
                const csvText = await response.text();
                
                // 按行切開
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                globalChecklistItems = [];

                // i=0 是 Header(欄位名稱)，我們直接從 i=1 開始抓取真實資料
                if (lines.length > 1) {
                    const userCheckedStates = JSON.parse(localStorage.getItem('ok_checklist_user_checked')) || {};

                    for (let i = 1; i < lines.length; i++) {
                        // 使用安全 CSV 逗號切割法
                        const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                        
                        // 如果切出來的欄位少於 4 個，或是關鍵的 D 欄（項目名稱）是空的就跳過
                        if (currentLine.length < 4 || !currentLine[3]) continue; 
                        
                        // 不管欄位名稱，直接用 [欄位索引] 抓取資料
                        const itemId = currentLine[0] || 'chk-' + i;       // A 欄 (ID)
                        const catName = currentLine[1] || '其他未分類';     // B 欄 (區域/大分類)
                        const typeName = currentLine[2] || '';             // C 欄 (分類/次類型)
                        const itemText = currentLine[3];                   // D 欄 (項目名稱)
                        const itemQty = parseInt(currentLine[4]) || 1;     // E 欄 (數量)
                        const itemNote = currentLine[5] || '';             // F 欄 (備註)

                        // 行前行李各項大清單預設為 true (收合)
                        if (checklistCollapsedCategories[catName] === undefined) {
                            checklistCollapsedCategories[catName] = true;
                        }

                        globalChecklistItems.push({
                            id: itemId,
                            category: catName,
                            type: typeName,
                            text: itemText,
                            qty: itemQty,
                            note: itemNote,
                            checked: userCheckedStates[itemId] === true
                        });
                    }
                }
                renderChecklist(globalChecklistItems);
            } catch (error) {
                console.error("行前準備清單拉取異常:", error);
                document.getElementById('checklist-container').innerHTML = `
                    <div class="text-center py-8 text-sm text-fuji-accent font-medium">
                        <i class="fa-solid fa-triangle-exclamation mr-1"></i> 無法從雲端同步「準備」分頁資料，請確認雲端分頁名稱確實為「準備」。
                    </div>`;
            }
        }

        // 行李打勾狀態切換處理
        function toggleCheck(id) {
            const userCheckedStates = JSON.parse(localStorage.getItem('ok_checklist_user_checked')) || {};
            
            globalChecklistItems = globalChecklistItems.map(item => {
                if (item.id === id) {
                    const nextState = !item.checked;
                    userCheckedStates[id] = nextState; 
                    return { ...item, checked: nextState };
                }
                return item;
            });
            
            localStorage.setItem('ok_checklist_user_checked', JSON.stringify(userCheckedStates));
            renderChecklist(globalChecklistItems);
        }

        // 抓取「準備」清單資料
        function renderChecklist(items) {
            const container = document.getElementById('checklist-container'); 
            if (!container) return; 
            container.innerHTML = '';
            
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-sm text-fuji-secondary font-medium">✨ 雲端清單中尚無任何準備項目。</div>`;
                return;
            }

            // 第一層分組：依 B 欄大分類(區域) 分組
            const categoryGroups = {};
            items.forEach(item => {
                const cat = item.category;
                if (!categoryGroups[cat]) categoryGroups[cat] = [];
                categoryGroups[cat].push(item);
            });

            for (const [categoryName, catItems] of Object.entries(categoryGroups)) {
                const isCollapsed = checklistCollapsedCategories[categoryName] === true;
                
                // 箭頭 Icon 變化邏輯，收合時向右 (fa-caret-right)，展開時向下 (fa-caret-down)
                const arrowIcon = isCollapsed ? 'fa-caret-right' : 'fa-caret-down';
                const doneCount = catItems.filter(i => i.checked).length;

                let catHtml = `
                    <div class="bg-fuji-paper rounded-xl border border-fuji-light shadow-md overflow-hidden bg-white">
                        <div onclick="toggleChecklistCategoryCollapse('${categoryName}')" class="bg-fuji-primary px-3.5 py-2 flex justify-between items-center cursor-pointer hover:bg-fuji-dark select-none transition-all">
                            <div class="flex items-center gap-2 min-w-0">
                                <div class="w-7 h-7 bg-white/10 rounded-md flex items-center justify-center text-white overflow-hidden font-bold text-sm flex-shrink-0">
                                    <i class="fa-solid fa-briefcase text-fuji-light"></i>
                                </div>
                                <div class="flex flex-col text-left">
                                    <span class="font-extrabold text-base text-white tracking-wide truncate">${categoryName}</span>
                                    <span class="text-[13px] text-fuji-light/90 font-medium -mt-0.5">已完成 ${doneCount} / ${catItems.length} 件項目</span>
                                </div>
                            </div>
                            <div class="text-white pr-1 text-[10px]">
                                <i class="fa-solid ${arrowIcon} text-sm text-white"></i>
                            </div>
                        </div>
                        <div class="${isCollapsed ? 'hidden' : ''} p-3.5 space-y-4">`;

                // 第二層分組：依 C 欄次分類(類型) 分組
                const typeGroups = {};
                catItems.forEach(item => {
                    const t = item.type ? item.type.trim() : "";
                    if (!typeGroups[t]) typeGroups[t] = [];
                    typeGroups[t].push(item);
                });

                for (const [typeName, subItems] of Object.entries(typeGroups)) {
                    const isDefaultGroup = (typeName === "");
                    catHtml += `
                        <div class="space-y-2.5">
                            <div class="flex items-center gap-1.5 text-sm font-bold ${isDefaultGroup ? 'text-fuji-secondary/60' : 'text-fuji-accent bg-amber-500/5 px-2 py-0.5 rounded w-fit text-[14px]'}">
                                <i class="fa-solid ${isDefaultGroup ? 'fa-circle-notch text-[14px]' : 'fa-folder-open'}"></i>
                                <span>${isDefaultGroup ? '一般準備項目' : typeName}</span>
                            </div>
                            <div class="pl-1 space-y-3">`;

                    subItems.forEach(item => {
                        const isChecked = item.checked === true;
                        
                        // 清單勾選完成（isChecked 為 true）時，將備註 (item.note) 一併隱藏不渲染
                        let noteHtml = '';
                        if (item.note && !isChecked) {
                            noteHtml = `<p class="text-[13px] text-fuji-secondary/90 font-medium mt-1 leading-normal break-all">${item.note}</p>`;
                        }

                        catHtml += `
                            <label class="flex items-start gap-3 text-sm text-fuji-dark font-medium cursor-pointer select-none group min-h-[20px]">
                                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${item.id}')" class="mt-0.5 accent-fuji-primary h-4 w-4 rounded flex-shrink-0">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="${isChecked ? 'line-through text-fuji-secondary font-normal' : 'font-bold text-fuji-dark text-[14px]'} break-all">${item.text}</span>
                                        <span class="text-[13px] font-extrabold px-2 py-0.2 bg-fuji-bg border border-fuji-light text-fuji-primary rounded-md shadow-3xs">x ${item.qty}</span>
                                    </div>
                                    ${noteHtml}
                                </div>
                            </label>`;
                    });
                    catHtml += `</div></div>`;
                }
                catHtml += `</div></div>`;
                container.innerHTML += catHtml;
            }
        }

        // 準備清單 打勾互動切換
        function toggleCheck(id) {
            const userCheckedStates = JSON.parse(localStorage.getItem('ok_checklist_user_checked')) || {};
            globalChecklistItems = globalChecklistItems.map(item => {
                if (item.id === id) {
                    const nextState = !item.checked;
                    userCheckedStates[id] = nextState; 
                    return { ...item, checked: nextState };
                }
                return item;
            });
            localStorage.setItem('ok_checklist_user_checked', JSON.stringify(userCheckedStates));
            renderChecklist(globalChecklistItems);
        }

        // 渲染依據「區域（大分類）」與「分類（次類型）」雙層排版的大字體行李檢查清單
        function renderChecklist(items) {
            const container = document.getElementById('checklist-container'); 
            if (!container) return; 
            container.innerHTML = '';
            
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-sm text-fuji-secondary font-medium">✨ 雲端清單中尚無任何準備項目。</div>`;
                return;
            }

            // 第一層分組：依 B 欄大分類(區域) 分組
            const categoryGroups = {};
            items.forEach(item => {
                const cat = item.category;
                if (!categoryGroups[cat]) categoryGroups[cat] = [];
                categoryGroups[cat].push(item);
            });

            for (const [categoryName, catItems] of Object.entries(categoryGroups)) {
                const isCollapsed = checklistCollapsedCategories[categoryName] === true;
                
                // 修正箭頭 Icon 變化邏輯，收合時向右 (fa-caret-right)，展開時向下 (fa-caret-down)
                const arrowIcon = isCollapsed ? 'fa-caret-right' : 'fa-caret-down';
                const doneCount = catItems.filter(i => i.checked).length;

                let catHtml = `
                    <div class="bg-fuji-paper rounded-xl border border-fuji-light shadow-md overflow-hidden bg-white">
                        <div onclick="toggleChecklistCategoryCollapse('${categoryName}')" class="bg-fuji-primary px-3.5 py-2 flex justify-between items-center cursor-pointer hover:bg-fuji-dark select-none transition-all">
                            <div class="flex items-center gap-2 min-w-0">
                                <div class="w-7 h-7 bg-white/10 rounded-md flex items-center justify-center text-white overflow-hidden font-bold text-sm flex-shrink-0">
                                    <i class="fa-solid fa-briefcase text-fuji-light"></i>
                                </div>
                                <div class="flex flex-col text-left">
                                    <span class="font-extrabold text-base text-white tracking-wide truncate">${categoryName}</span>
                                    <span class="text-[13px] text-fuji-light/90 font-medium -mt-0.5">已完成 ${doneCount} / ${catItems.length} 件項目</span>
                                </div>
                            </div>
                            <div class="text-white pr-1 text-[10px]">
                                <i class="fa-solid ${arrowIcon} text-sm text-white"></i>
                            </div>
                        </div>
                        <div class="${isCollapsed ? 'hidden' : ''} p-3.5 space-y-4">`;

                // 第二層分組：依 C 欄次分類(類型) 分組
                const typeGroups = {};
                catItems.forEach(item => {
                    const t = item.type ? item.type.trim() : "";
                    if (!typeGroups[t]) typeGroups[t] = [];
                    typeGroups[t].push(item);
                });

                for (const [typeName, subItems] of Object.entries(typeGroups)) {
                    const isDefaultGroup = (typeName === "");
                    catHtml += `
                        <div class="space-y-2.5">
                            <div class="flex items-center gap-1.5 text-sm font-bold ${isDefaultGroup ? 'text-fuji-primary bg-fuji-light px-2 py-0.5 rounded w-fit text-[14px]' 
                                                                                                     : 'text-fuji-accent bg-amber-500/5 px-2 py-0.5 rounded w-fit text-[14px]'}">
                                <i class="fa-solid ${isDefaultGroup ? 'fa-circle-notch text-[14px]' : 'fa-folder-open'}"></i>
                                <span>${isDefaultGroup ? '一般準備項目' : typeName}</span>
                            </div>
                            <div class="pl-1 space-y-3">`;

                    subItems.forEach(item => {
                        const isChecked = item.checked === true;
                        
                        // 清單勾選完成（isChecked 為 true）時，將備註 (item.note) 一併隱藏不渲染
                        let noteHtml = '';
                        if (item.note && !isChecked) {
                            noteHtml = `<p class="text-[13px] text-fuji-secondary/90 font-medium mt-1 leading-normal break-all">${item.note}</p>`;
                        }

                        catHtml += `
                            <label class="flex items-start gap-3 text-sm text-fuji-dark font-medium cursor-pointer select-none group min-h-[20px]">
                                <input type="checkbox" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${item.id}')" class="mt-0.5 accent-fuji-primary h-4 w-4 rounded flex-shrink-0">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="${isChecked ? 'line-through text-fuji-secondary font-normal' : 'font-bold text-fuji-dark text-[14px]'} break-all">${item.text}</span>
                                        <span class="text-[13px] font-extrabold px-2 py-0.2 bg-fuji-bg border border-fuji-light text-fuji-primary rounded-md shadow-3xs">x ${item.qty}</span>
                                    </div>
                                    ${noteHtml}
                                </div>
                            </label>`;
                    });
                    catHtml += `</div></div>`;
                }
                catHtml += `</div></div>`;
                container.innerHTML += catHtml;
            }
        }
        // #endregion tab5.準備------------------------------------------------------------------------------
        

        // #region tab6.資訊---------------------------------------------------------------------------------
        // #endregion tab6.資訊------------------------------------------------------------------------------
    </script>
